<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>書籍検索 - 楽天ブックス</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Zen Kaku Gothic New', sans-serif; }
    .font-serif-jp { font-family: 'Noto Serif JP', serif; }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeSlideIn 0.5s ease-out both; }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    .keyword-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 9999px;
      font-size: 14px;
      color: #92400e;
    }
    .keyword-tag button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fcd34d;
      color: #92400e;
      font-size: 12px;
      line-height: 1;
    }
    .keyword-tag button:hover {
      background: #f59e0b;
      color: white;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-stone-50 via-amber-50/30 to-stone-100">
  
  <!-- ヘッダー -->
  <header class="bg-white/80 backdrop-blur-sm border-b border-stone-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-amber-600 to-amber-700 rounded-lg flex items-center justify-center shadow-md">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
          </svg>
        </div>
        <div>
          <h1 class="text-xl font-bold text-stone-800 font-serif-jp">書籍検索</h1>
          <p class="text-xs text-stone-500">楽天ブックス</p>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <!-- 検索フォーム -->
    <div class="bg-white rounded-2xl shadow-sm border border-stone-200 p-6 mb-8">
      <div class="space-y-4">
        <!-- キーワード入力 -->
        <div>
          <label class="block text-sm font-medium text-stone-700 mb-2">キーワード（複数指定可・OR検索）</label>
          <div class="flex gap-2">
            <div class="relative flex-1">
              <input type="text" id="keywordInput" placeholder="キーワードを入力してEnterまたは追加ボタン" class="w-full pl-10 pr-4 py-3 border border-stone-300 rounded-xl focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none text-stone-800 placeholder-stone-400" onkeydown="if(event.key==='Enter'){event.preventDefault();addKeyword();}">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-stone-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
              </svg>
            </div>
            <button onclick="addKeyword()" class="px-4 py-3 bg-amber-100 hover:bg-amber-200 text-amber-700 font-medium rounded-xl transition-colors">
              追加
            </button>
          </div>
          <!-- キーワードタグ表示エリア -->
          <div id="keywordTags" class="flex flex-wrap gap-2 mt-3 min-h-[32px]"></div>
          <p class="text-xs text-stone-400 mt-2">複数のキーワードを指定すると、いずれかを含む書籍を検索します（OR検索）</p>
        </div>
        
        <!-- 価格範囲 -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-2">最低価格（円）</label>
            <input type="number" id="minPrice" placeholder="0" min="0" class="w-full px-4 py-3 border border-stone-300 rounded-xl focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none text-stone-800">
          </div>
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-2">最高価格（円）</label>
            <input type="number" id="maxPrice" placeholder="上限なし" min="0" class="w-full px-4 py-3 border border-stone-300 rounded-xl focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none text-stone-800">
          </div>
        </div>
        <p class="text-xs text-stone-400">※価格フィルターは検索結果取得後にクライアント側で適用されます</p>
        
        <!-- 検索・クリアボタン -->
        <div class="flex gap-2">
          <button onclick="searchBooks()" id="searchBtn" class="flex-1 py-3 bg-gradient-to-r from-amber-600 to-amber-700 hover:from-amber-700 hover:to-amber-800 text-white font-medium rounded-xl transition-all shadow-md hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            検索する
          </button>
          <button onclick="clearAll()" class="px-4 py-3 bg-stone-100 hover:bg-stone-200 text-stone-600 font-medium rounded-xl transition-colors">
            クリア
          </button>
        </div>
      </div>
    </div>

    <!-- 進捗表示 -->
    <div id="progressContainer" class="mb-6 p-4 bg-blue-50 border border-blue-200 rounded-xl hidden">
      <div class="flex items-center gap-3">
        <svg class="w-5 h-5 animate-spin text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
        </svg>
        <p id="progressMessage" class="text-blue-700"></p>
      </div>
    </div>

    <!-- エラー表示 -->
    <div id="errorContainer" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700 hidden">
      <div class="flex items-start gap-3">
        <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <div>
          <p id="errorMessage" class="font-medium"></p>
          <p id="errorDetail" class="text-sm mt-1"></p>
        </div>
      </div>
    </div>

    <!-- 結果ヘッダー -->
    <div id="resultsHeader" class="flex flex-wrap items-center justify-between gap-4 mb-6 hidden">
      <div>
        <p class="text-stone-600" id="resultsCount"></p>
        <p class="text-xs text-stone-400" id="filterInfo"></p>
      </div>
      <div class="flex items-center gap-2">
        <select id="sortBy" onchange="sortAndDisplayResults()" class="px-3 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none text-sm text-stone-700 bg-white">
          <option value="standard">関連度順</option>
          <option value="priceAsc">価格が安い順</option>
          <option value="priceDesc">価格が高い順</option>
          <option value="dateDesc">発売日が新しい順</option>
          <option value="dateAsc">発売日が古い順</option>
          <option value="title">タイトル順</option>
        </select>
      </div>
    </div>

    <!-- 検索結果グリッド -->
    <div id="resultsGrid" class="grid gap-4 md:grid-cols-2"></div>

    <!-- 初期状態 -->
    <div id="initialState" class="text-center py-16">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-amber-100 to-amber-200 rounded-full mb-6">
        <svg class="w-10 h-10 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-stone-700 mb-2 font-serif-jp">書籍を検索しましょう</h2>
      <p class="text-stone-500">キーワードと価格範囲を指定して検索できます</p>
      <p class="text-sm text-stone-400 mt-2">複数キーワードでOR検索が可能です</p>
    </div>

    <!-- 検索結果なし -->
    <div id="noResults" class="text-center py-16 hidden">
      <svg class="w-16 h-16 text-stone-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
      </svg>
      <p class="text-stone-500">条件に一致する書籍が見つかりませんでした</p>
      <p class="text-sm text-stone-400 mt-2">キーワードや価格範囲を変更してお試しください</p>
    </div>
  </main>

  <!-- フッター -->
  <footer class="border-t border-stone-200 bg-white/50 mt-12">
    <div class="max-w-6xl mx-auto px-4 py-6 text-center text-sm text-stone-500">
      <p>楽天ブックス検索APIを使用しています</p>
    </div>
  </footer>

  <script>
    // APIキー（埋め込み）
    const APP_ID = 'f73e85f4-2fa7-4c54-92f6-bec5df99e574';
    const ACCESS_KEY = 'pk_tGwZPVUnMxqhyTKA5UBTZJpqno2UXiMV5eKvBf3zfUp';

    // グローバル変数
    let keywords = [];
    let allBooks = [];      // API取得結果（全件・重複なし）
    let filteredBooks = []; // 価格フィルター適用後

    // ローカルストレージのキー
    const STORAGE_KEYS = {
      keywords: 'bookSearch_keywords',
      minPrice: 'bookSearch_minPrice',
      maxPrice: 'bookSearch_maxPrice'
    };

    // 初期化
    document.addEventListener('DOMContentLoaded', () => {
      loadSavedData();
      renderKeywordTags();
    });

    // 保存データの読み込み
    function loadSavedData() {
      const savedKeywords = localStorage.getItem(STORAGE_KEYS.keywords);
      if (savedKeywords) {
        keywords = JSON.parse(savedKeywords);
      }
      
      const savedMinPrice = localStorage.getItem(STORAGE_KEYS.minPrice);
      if (savedMinPrice) {
        document.getElementById('minPrice').value = savedMinPrice;
      }
      
      const savedMaxPrice = localStorage.getItem(STORAGE_KEYS.maxPrice);
      if (savedMaxPrice) {
        document.getElementById('maxPrice').value = savedMaxPrice;
      }
    }

    // データの保存
    function saveData() {
      localStorage.setItem(STORAGE_KEYS.keywords, JSON.stringify(keywords));
      localStorage.setItem(STORAGE_KEYS.minPrice, document.getElementById('minPrice').value);
      localStorage.setItem(STORAGE_KEYS.maxPrice, document.getElementById('maxPrice').value);
    }

    // キーワード追加
    function addKeyword() {
      const input = document.getElementById('keywordInput');
      const keyword = input.value.trim();
      
      if (keyword && !keywords.includes(keyword)) {
        keywords.push(keyword);
        input.value = '';
        renderKeywordTags();
        saveData();
      }
    }

    // キーワード削除
    function removeKeyword(index) {
      keywords.splice(index, 1);
      renderKeywordTags();
      saveData();
    }

    // キーワードタグの描画
    function renderKeywordTags() {
      const container = document.getElementById('keywordTags');
      
      if (keywords.length === 0) {
        container.innerHTML = '<span class="text-stone-400 text-sm">キーワードを追加してください</span>';
        return;
      }
      
      container.innerHTML = keywords.map((keyword, index) => `
        <span class="keyword-tag">
          ${escapeHtml(keyword)}
          <button onclick="removeKeyword(${index})" title="削除">×</button>
        </span>
      `).join('');
    }

    // HTMLエスケープ
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
    }

    // 全クリア
    function clearAll() {
      keywords = [];
      document.getElementById('keywordInput').value = '';
      document.getElementById('minPrice').value = '';
      document.getElementById('maxPrice').value = '';
      renderKeywordTags();
      saveData();
      
      allBooks = [];
      filteredBooks = [];
      document.getElementById('resultsGrid').innerHTML = '';
      document.getElementById('resultsHeader').classList.add('hidden');
      document.getElementById('noResults').classList.add('hidden');
      document.getElementById('initialState').classList.remove('hidden');
    }

    function showError(message, detail = '') {
      const container = document.getElementById('errorContainer');
      document.getElementById('errorMessage').textContent = message;
      document.getElementById('errorDetail').textContent = detail;
      container.classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('errorContainer').classList.add('hidden');
    }

    function showProgress(message) {
      const container = document.getElementById('progressContainer');
      document.getElementById('progressMessage').textContent = message;
      container.classList.remove('hidden');
    }

    function hideProgress() {
      document.getElementById('progressContainer').classList.add('hidden');
    }

    // API呼び出し（1回）
    async function fetchBooks(keyword, page = 1) {
      const params = new URLSearchParams({
        applicationId: APP_ID,
        accessKey: ACCESS_KEY,
        title: keyword,
        hits: 30,
        page: page,
        sort: 'standard',
        outOfStockFlag: 1,
        formatVersion: 2,
        format: 'json'
      });

      const url = `https://openapi.rakuten.co.jp/services/api/BooksBook/Search/20170404?${params.toString()}`;
      const response = await fetch(url);
      return await response.json();
    }

    // 書籍検索（複数キーワードOR検索）
    async function searchBooks() {
      hideError();
      hideProgress();
      
      if (keywords.length === 0) {
        showError('キーワードを1つ以上追加してください');
        return;
      }

      // 入力値を保存
      saveData();

      const btn = document.getElementById('searchBtn');
      btn.disabled = true;
      btn.innerHTML = `
        <svg class="w-5 h-5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
        </svg>
        検索中...
      `;

      document.getElementById('initialState').classList.add('hidden');

      try {
        // ISBNをキーにしたMapで重複を確実に防止
        const booksMap = new Map();
        
        for (let i = 0; i < keywords.length; i++) {
          const keyword = keywords[i];
          showProgress(`検索中... (${i + 1}/${keywords.length}) 「${keyword}」`);
          
          // ページ1を取得
          let data = await fetchBooks(keyword, 1);
          
          if (data.error || data.errors) {
            console.warn(`キーワード「${keyword}」でエラー:`, data);
            continue;
          }

          // 結果を追加
          const items = data.Items || [];
          for (const book of items) {
            const key = book.isbn || book.itemUrl; // ISBNがない場合はURLをキーに
            if (!booksMap.has(key)) {
              booksMap.set(key, book);
            }
          }

          // 追加ページがあれば取得（最大3ページ）
          const totalPages = Math.min(data.pageCount || 1, 3);
          for (let page = 2; page <= totalPages; page++) {
            showProgress(`検索中... 「${keyword}」 ページ ${page}/${totalPages}`);
            
            await new Promise(resolve => setTimeout(resolve, 300)); // API制限対策
            
            data = await fetchBooks(keyword, page);
            
            if (data.error || data.errors) break;
            
            const pageItems = data.Items || [];
            if (pageItems.length === 0) break;
            
            for (const book of pageItems) {
              const key = book.isbn || book.itemUrl;
              if (!booksMap.has(key)) {
                booksMap.set(key, book);
              }
            }
          }
          
          // キーワード間の待機
          if (i < keywords.length - 1) {
            await new Promise(resolve => setTimeout(resolve, 300));
          }
        }

        hideProgress();
        
        // Mapから配列に変換（順序を保持）
        allBooks = Array.from(booksMap.values());
        
        console.log(`取得完了: 全${allBooks.length}件（重複除去済み）`);
        
        // 価格フィルタリングを適用して表示
        applyPriceFilterAndDisplay();

      } catch (err) {
        hideProgress();
        showError('通信エラーが発生しました', err.message);
        console.error(err);
      }

      resetButton();
    }

    // 価格フィルタリングを適用して表示
    function applyPriceFilterAndDisplay() {
      const minPrice = parseInt(document.getElementById('minPrice').value) || 0;
      const maxPrice = parseInt(document.getElementById('maxPrice').value) || Infinity;
      
      // 価格フィルタリング
      filteredBooks = allBooks.filter(book => {
        const price = book.itemPrice || 0;
        return price >= minPrice && price <= maxPrice;
      });
      
      console.log(`価格フィルター適用: ${allBooks.length}件 → ${filteredBooks.length}件 (${minPrice}円〜${maxPrice === Infinity ? '上限なし' : maxPrice + '円'})`);
      
      // ソートして表示
      sortAndDisplayResults();
    }

    function resetButton() {
      const btn = document.getElementById('searchBtn');
      btn.disabled = false;
      btn.innerHTML = `
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        検索する
      `;
    }

    // ソートして表示
    function sortAndDisplayResults() {
      const sortBy = document.getElementById('sortBy').value;
      
      let sortedBooks = [...filteredBooks];
      
      switch (sortBy) {
        case 'priceAsc':
          sortedBooks.sort((a, b) => (a.itemPrice || 0) - (b.itemPrice || 0));
          break;
        case 'priceDesc':
          sortedBooks.sort((a, b) => (b.itemPrice || 0) - (a.itemPrice || 0));
          break;
        case 'dateDesc':
          sortedBooks.sort((a, b) => (b.salesDate || '').localeCompare(a.salesDate || ''));
          break;
        case 'dateAsc':
          sortedBooks.sort((a, b) => (a.salesDate || '').localeCompare(b.salesDate || ''));
          break;
        case 'title':
          sortedBooks.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
          break;
        default:
          // 関連度順（元の順序を維持）
          break;
      }

      displayResults(sortedBooks);
    }

    function displayResults(booksToShow) {
      const grid = document.getElementById('resultsGrid');
      const header = document.getElementById('resultsHeader');
      const noResults = document.getElementById('noResults');
      const countEl = document.getElementById('resultsCount');
      const filterInfoEl = document.getElementById('filterInfo');

      if (booksToShow.length === 0) {
        header.classList.add('hidden');
        grid.innerHTML = '';
        noResults.classList.remove('hidden');
        return;
      }

      noResults.classList.add('hidden');
      header.classList.remove('hidden');
      
      countEl.innerHTML = `<span class="font-bold text-amber-700">${booksToShow.length}</span> 件の書籍が見つかりました`;
      
      // フィルター情報
      const minPrice = document.getElementById('minPrice').value;
      const maxPrice = document.getElementById('maxPrice').value;
      let filterText = '';
      if (minPrice || maxPrice) {
        filterText = `価格フィルター: ${minPrice || '0'}円〜${maxPrice || '上限なし'}円`;
        if (allBooks.length !== filteredBooks.length) {
          filterText += ` (全${allBooks.length}件中)`;
        }
      }
      filterInfoEl.textContent = filterText;

      grid.innerHTML = booksToShow.map((book, index) => createBookCard(book, index)).join('');
    }

    function createBookCard(book, index) {
      const formatPrice = (price) => {
        return new Intl.NumberFormat('ja-JP', { style: 'currency', currency: 'JPY' }).format(price || 0);
      };

      const imageHtml = book.largeImageUrl 
        ? `<img src="${book.largeImageUrl}" alt="${escapeHtml(book.title)}" class="w-full h-full object-cover" style="min-height: 160px" loading="lazy">`
        : `<div class="w-full h-40 flex items-center justify-center">
            <svg class="w-10 h-10 text-stone-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
