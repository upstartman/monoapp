<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>💰 Welfit管理アプリ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    color: #222;
  }
  .container {
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    padding: 40px;
    max-width: 1100px;
    margin: 0 auto;
  }
  h1 { color: #333; margin-bottom: 8px; font-size: 26px; text-align: center; }
  .subtitle { text-align: center; color: #666; margin-bottom: 18px; font-size: 14px; }

  .top-bar {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 20px;
  }
  .top-bar label { font-size: 13px; font-weight: 600; color: #555; }
  .top-bar select {
    padding: 8px 12px; border-radius: 8px; border: 2px solid #e0e0e0;
    font-size: 14px; background: white;
  }
  .user-info { font-size: 13px; color: #555; }

  .btn {
    padding: 10px 18px; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: transform .2s, box-shadow .2s;
  }
  .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
  .btn-secondary { background: #e0e4ea; color: #333; }
  .btn-secondary:hover { background: #cfd5dd; }
  .btn-danger { background: #e74c3c; color: #fff; }
  .btn-danger:hover { background: #c0392b; }

  .tabs { display: flex; gap: 10px; margin-bottom: 24px; border-bottom: 2px solid #e0e0e0; }
  .tab {
    padding: 12px 24px; background: transparent; border: none;
    border-bottom: 3px solid transparent; color: #666;
    font-size: 16px; font-weight: 600; cursor: pointer;
    position: relative; bottom: -2px; transition: all .3s;
  }
  .tab:hover { color: #667eea; }
  .tab.active { color: #667eea; border-bottom-color: #667eea; }
  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn .3s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .signin-notice {
    background: #f8f9fa; padding: 30px; border-radius: 12px;
    text-align: center; color: #555;
  }

  /* ===== 上部スタッツカード ===== */
  .stats-cards {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-bottom: 18px;
  }
  .stat-card {
    border-radius: 12px; padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 6px rgba(0,0,0,.05);
  }
  .stat-card .label { font-size: 13px; font-weight: 600; color: #555; }
  .stat-card .value { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat-budget { background: #d4edda; color: #155724; }
  .stat-budget .value-wrap { display: flex; align-items: center; gap: 6px; }
  .stat-budget input[type="number"] {
    width: 140px; padding: 6px 10px; border: 2px solid #a3d4af;
    border-radius: 8px; font-size: 18px; font-weight: 700;
    text-align: right; background: #fff; color: #155724;
    font-variant-numeric: tabular-nums;
  }
  .stat-budget input[type="number"]:focus { outline: none; border-color: #4caf50; }
  .stat-remain { background: #fff3cd; color: #664d03; }
  .stat-remain.negative { background: #ffd5d5; color: #a00; }

  /* ===== 表 ===== */
  .ledger-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid #e0e0e0; }
  .ledger { width: 100%; border-collapse: collapse; font-size: 14px; background: #fff; }
  .ledger th, .ledger td { border-bottom: 1px solid #e0e0e0; padding: 10px 12px; text-align: left; vertical-align: middle; }
  .ledger thead th { background: #667eea; color: #fff; font-weight: 600; white-space: nowrap; }
  .ledger td.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .ledger tbody tr:hover td { background: #f8f9fa; }
  .empty-row td { text-align: center; color: #999; padding: 24px; }

  /* ===== 申請済トグル ===== */
  .applied-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 14px;
    font-size: 12px; font-weight: 700; cursor: pointer;
    border: none; user-select: none;
    transition: all .15s;
  }
  .applied-toggle.on { background: #cfe9d0; color: #1d6f1f; }
  .applied-toggle.on:hover { background: #b8dfb9; }
  .applied-toggle.off { background: #f0f0f0; color: #888; }
  .applied-toggle.off:hover { background: #e0e0e0; }
  .applied-toggle .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .applied-toggle.on .dot { background: #1d6f1f; }
  .applied-toggle.off .dot { background: #aaa; }

  .action-btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .icon-btn {
    background: none; border: 1px solid #e0e0e0; border-radius: 6px;
    padding: 4px 8px; cursor: pointer; font-size: 12px;
  }
  .icon-btn:hover { background: #f0f0f0; }
  .icon-btn.danger:hover { background: #ffe6e6; border-color: #e74c3c; color: #c0392b; }

  .add-btn-wrap { margin-top: 16px; text-align: center; }

  .dup-section {
    margin-top: 32px; background: #f8f9fa; padding: 20px;
    border-radius: 12px; border: 1px solid #e0e0e0;
  }
  .dup-section h3 { margin-bottom: 12px; color: #333; }
  .dup-section input[type="search"] {
    width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0;
    border-radius: 8px; font-size: 14px; margin-bottom: 12px;
  }
  .dup-section input[type="search"]:focus { outline: none; border-color: #667eea; }
  .book-list { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; border-radius: 8px; overflow: hidden; }
  .book-list th, .book-list td { border-bottom: 1px solid #eee; padding: 8px 10px; text-align: left; }
  .book-list th { background: #667eea; color: #fff; }
  .book-list tr.dup-hit td { background: #ffe6e6; }

  .dup-warning {
    background: #ffe6e6; color: #a30000;
    padding: 10px 14px; border-radius: 8px;
    margin: 10px 0; font-size: 13px;
  }

  /* ===== 書籍名リスト ===== */
  .book-title-row {
    display: flex; gap: 6px; margin-bottom: 6px; align-items: center;
  }
  .book-title-row input {
    flex: 1; padding: 9px 12px; border: 2px solid #e0e0e0;
    border-radius: 8px; font-size: 14px;
  }
  .book-title-row input:focus { outline: none; border-color: #667eea; }
  .book-title-row .remove {
    background: #f0f0f0; border: none; border-radius: 6px;
    width: 32px; height: 32px; cursor: pointer; font-size: 16px; color: #888;
  }
  .book-title-row .remove:hover { background: #ffd5d5; color: #c0392b; }
  #addBookTitleBtn {
    background: none; border: 1px dashed #667eea; color: #667eea;
    border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px;
    margin-top: 4px;
  }
  #addBookTitleBtn:hover { background: rgba(102,126,234,0.08); }

  /* ===== モーダル ===== */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; }
  .modal.show { display: flex; align-items: center; justify-content: center; }
  .modal-content {
    background: white; border-radius: 15px; padding: 28px;
    max-width: 560px; width: 92%; max-height: 92vh; overflow-y: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3); animation: slideUp .25s;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-header h2 { font-size: 20px; color: #333; }
  .close-btn { background: none; border: none; font-size: 26px; color: #999; cursor: pointer; }
  .close-btn:hover { color: #333; }
  .modal-content label { display: block; margin-bottom: 12px; font-size: 13px; color: #555; font-weight: 600; }
  .modal-content input, .modal-content select, .modal-content textarea {
    width: 100%; padding: 9px 12px; border: 2px solid #e0e0e0;
    border-radius: 8px; font-size: 14px; margin-top: 4px;
    font-family: inherit;
  }
  .modal-content input:focus, .modal-content select:focus, .modal-content textarea:focus {
    outline: none; border-color: #667eea;
  }
  .modal-content input[type="file"] {
    padding: 10px; border: 2px dashed #667eea;
  }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

  .image-preview-box {
    max-width: 100%; max-height: 240px; overflow: auto;
    border: 1px solid #ddd; border-radius: 8px; padding: 10px;
    background: #f8f9fa; margin-top: 10px;
  }
  .image-preview-box img { max-width: 100%; height: auto; display: block; }
  .image-thumb { width: 44px; height: 44px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid #ddd; }

  .hidden { display: none !important; }

  @media (max-width: 720px) {
    .container { padding: 24px 16px; }
    h1 { font-size: 20px; }
    .ledger { font-size: 12px; }
    .ledger th, .ledger td { padding: 6px 8px; }
    .tab { padding: 10px 14px; font-size: 14px; }
    .stats-cards { grid-template-columns: 1fr; }
    .stat-card .value { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>💰 Welfit管理アプリ</h1>
  <p class="subtitle">Welfit経費精算の申請内容を年度別に管理</p>

  <div class="top-bar">
    <label>年度:
      <select id="yearSelect"></select>
    </label>
    <span class="user-info" id="userInfo">未ログイン</span>
    <button id="loginBtn" class="btn btn-primary">Googleでログイン</button>
    <button id="logoutBtn" class="btn btn-secondary hidden">ログアウト</button>
  </div>

  <div id="signinNotice" class="signin-notice">
    <p>Googleアカウントでログインすると、申請データを年度別に管理できます。</p>
  </div>

  <div id="appBody" class="hidden">
    <div class="tabs">
      <button class="tab active" data-tab="welfit">💼 Wel-fit</button>
      <button class="tab" data-tab="expert">📚 エキスパート基金</button>
    </div>

    <!-- Wel-fit タブ -->
    <section id="tab-welfit" class="tab-content active">
      <div class="stats-cards">
        <div class="stat-card stat-budget">
          <span class="label">当年度ポイント</span>
          <span class="value-wrap">
            <input type="number" id="welfitBudgetInput" min="0" step="1000" />
            <span>円</span>
          </span>
        </div>
        <div class="stat-card stat-remain" id="welfitRemainCard">
          <span class="label">残ポイント</span>
          <span class="value" id="welfitRemain">¥50,000</span>
        </div>
      </div>

      <div class="ledger-wrap">
        <table class="ledger">
          <thead>
            <tr>
              <th>日付</th>
              <th>使用ポイント</th>
              <th>申請済</th>
              <th>レシート</th>
              <th>メモ</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="welfitRows"></tbody>
        </table>
      </div>
      <div class="add-btn-wrap">
        <button id="addWelfit" class="btn btn-primary">+ 行を追加</button>
      </div>
    </section>

    <!-- エキスパート基金 タブ -->
    <section id="tab-expert" class="tab-content">
      <div class="stats-cards">
        <div class="stat-card stat-budget">
          <span class="label">当年度ポイント</span>
          <span class="value-wrap">
            <input type="number" id="expertBudgetInput" min="0" step="1000" />
            <span>円</span>
          </span>
        </div>
        <div class="stat-card stat-remain" id="expertRemainCard">
          <span class="label">残ポイント</span>
          <span class="value" id="expertRemain">¥132,000</span>
        </div>
      </div>

      <div class="ledger-wrap">
        <table class="ledger">
          <thead>
            <tr>
              <th>日付</th>
              <th>使用ポイント</th>
              <th>申請済</th>
              <th>書籍名</th>
              <th>レシート</th>
              <th>メモ</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="expertRows"></tbody>
        </table>
      </div>
      <div class="add-btn-wrap">
        <button id="addExpert" class="btn btn-primary">+ 行を追加</button>
      </div>

      <div class="dup-section">
        <h3>📖 書籍重複チェック（全年度横断）</h3>
        <input id="bookSearch" type="search" placeholder="書籍名で検索…" />
        <div style="overflow-x:auto;">
          <table class="book-list">
            <thead><tr><th>書籍名</th><th>年度</th><th>金額</th><th>レシート</th></tr></thead>
            <tbody id="bookListBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>
</div>

<!-- 編集モーダル -->
<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">行を追加</h2>
      <button type="button" class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <form id="modalForm">
      <input type="hidden" id="f_id" />
      <input type="hidden" id="f_kind" />
      <input type="hidden" id="f_existingReceiptData" />

      <label>日付 <span style="color:#e74c3c">*</span>
        <input type="date" id="f_date" required />
      </label>
      <label>金額(税込) <span style="color:#e74c3c">*</span>
        <input type="number" id="f_amount" min="0" step="1" required />
      </label>

      <div class="expert-only">
        <label>書籍名
          <div id="bookTitlesList"></div>
          <button type="button" id="addBookTitleBtn">+ 書籍を追加</button>
        </label>
        <div id="f_dupWarn" class="dup-warning hidden"></div>
      </div>

      <label>レシート画像 (任意)
        <input type="file" id="f_receipt" accept="image/*" />
      </label>
      <div id="f_receiptPreview" class="image-preview-box hidden">
        <img id="f_receiptImg" alt="プレビュー" />
        <div style="margin-top:8px; text-align:right;">
          <button type="button" class="btn btn-danger" id="f_removeReceipt" style="padding:6px 12px; font-size:12px;">画像を削除</button>
        </div>
      </div>

      <label>メモ
        <textarea id="f_note" rows="2"></textarea>
      </label>

      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">保存</button>
      </div>
    </form>
  </div>
</div>

<!-- 画像表示モーダル -->
<div id="imageModal" class="modal">
  <div class="modal-content" style="max-width:800px;">
    <div class="modal-header">
      <h2>📷 レシート画像</h2>
      <button type="button" class="close-btn" onclick="closeImageModal()">&times;</button>
    </div>
    <div style="max-height:70vh; overflow:auto; background:#f8f9fa; padding:10px; border-radius:8px;">
      <img id="imageModalImg" style="max-width:100%; height:auto; display:block; margin:0 auto;" />
    </div>
    <div class="modal-actions">
      <a id="imageDownloadLink" class="btn btn-primary" download style="text-decoration:none;">ダウンロード</a>
      <button type="button" class="btn btn-secondary" onclick="closeImageModal()">閉じる</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, addDoc, serverTimestamp, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ===== Firebase 設定 =====
const firebaseConfig = {
  apiKey: "AIzaSyCI2mhBCXeViCfsy-B7vo3VyEONqk1MWyg",
  authDomain: "wel-fit-management.firebaseapp.com",
  projectId: "wel-fit-management",
  storageBucket: "wel-fit-management.firebasestorage.app",
  messagingSenderId: "75123432379",
  appId: "1:75123432379:web:f606b61809ad728bfac29e"
};
const DEFAULT_BUDGETS = { welfit: 50000, expert: 132000 };

// 画像圧縮設定
const IMAGE_MAX_EDGE = 1200;
const IMAGE_JPEG_QUALITY = 0.7;
const IMAGE_MAX_BYTES = 700 * 1024;

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// ===== 状態 =====
const state = {
  user: null,
  year: String(new Date().getFullYear()),
  welfit: [],
  expert: [],
  expertAll: [],
  budgets: { welfit: DEFAULT_BUDGETS.welfit, expert: DEFAULT_BUDGETS.expert },
  pendingReceiptFile: null
};

const $ = id => document.getElementById(id);
const fmtYen = n => "¥" + Number(n || 0).toLocaleString("ja-JP");
const escapeHtml = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const normalizeTitle = s => String(s || "").trim().toLowerCase().replace(/\s+/g, "").replace(/[　]/g, "").normalize("NFKC");
const getBookTitles = r => Array.isArray(r.bookTitles) ? r.bookTitles : (r.bookTitle ? [r.bookTitle] : []);

// ===== 年度セレクタ =====
function buildYearSelector() {
  const sel = $("yearSelect");
  const now = new Date().getFullYear();
  sel.innerHTML = "";
  for (let y = now + 1; y >= now - 5; y--) {
    const opt = document.createElement("option");
    opt.value = String(y);
    opt.textContent = y + "年度";
    if (String(y) === state.year) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.onchange = async () => {
    state.year = sel.value;
    await loadAll();
  };
}

function setupTabs() {
  document.querySelectorAll(".tab").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(s => s.classList.remove("active"));
      btn.classList.add("active");
      $("tab-" + btn.dataset.tab).classList.add("active");
    };
  });
}

// ===== Firestore パス =====
const yearDocRef = (uid, year) => doc(db, "users", uid, "years", year);
const appsCol = (uid, year, kind) =>
  collection(db, "users", uid, "years", year, kind === "welfit" ? "welfit_apps" : "expert_apps");

// ===== 画像圧縮 =====
async function compressImageToDataUrl(file) {
  const dataUrl = await new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error("ファイル読み込み失敗"));
    r.readAsDataURL(file);
  });
  const img = await new Promise((resolve, reject) => {
    const im = new Image();
    im.onload = () => resolve(im);
    im.onerror = () => reject(new Error("画像読み込み失敗"));
    im.src = dataUrl;
  });
  let { width, height } = img;
  if (Math.max(width, height) > IMAGE_MAX_EDGE) {
    const s = IMAGE_MAX_EDGE / Math.max(width, height);
    width = Math.round(width * s);
    height = Math.round(height * s);
  }
  const cv = document.createElement("canvas");
  cv.width = width; cv.height = height;
  cv.getContext("2d").drawImage(img, 0, 0, width, height);
  let q = IMAGE_JPEG_QUALITY;
  let out = cv.toDataURL("image/jpeg", q);
  while (out.length > IMAGE_MAX_BYTES * 1.37 && q > 0.3) {
    q -= 0.1;
    out = cv.toDataURL("image/jpeg", q);
  }
  return out;
}

// ===== 読み込み =====
async function loadAll() {
  if (!state.user) return;
  const uid = state.user.uid;
  try {
    // 年度ドキュメント（予算保持）
    const yearSnap = await getDoc(yearDocRef(uid, state.year));
    const yearData = yearSnap.exists() ? yearSnap.data() : {};
    state.budgets.welfit = Number.isFinite(yearData.welfitBudget) ? yearData.welfitBudget : DEFAULT_BUDGETS.welfit;
    state.budgets.expert = Number.isFinite(yearData.expertBudget) ? yearData.expertBudget : DEFAULT_BUDGETS.expert;

    const [welSnap, expSnap] = await Promise.all([
      getDocs(appsCol(uid, state.year, "welfit")),
      getDocs(appsCol(uid, state.year, "expert"))
    ]);
    state.welfit = welSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    state.expert = expSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    state.expertAll = [];
    const yearsSnap = await getDocs(collection(db, "users", uid, "years"));
    await Promise.all(yearsSnap.docs.map(async yd => {
      const sub = await getDocs(appsCol(uid, yd.id, "expert"));
      sub.docs.forEach(d => state.expertAll.push({ id: d.id, year: yd.id, ...d.data() }));
    }));
  } catch (e) {
    console.error("読み込み失敗:", e);
    alert("データ読み込みに失敗: " + e.message);
  }
  $("welfitBudgetInput").value = state.budgets.welfit;
  $("expertBudgetInput").value = state.budgets.expert;
  renderWelfit();
  renderExpert();
  renderBookList();
}

// ===== 表示: Wel-fit =====
function renderWelfit() {
  const tbody = $("welfitRows");
  tbody.innerHTML = "";
  let used = 0;
  const rows = [...state.welfit].sort((a,b) => (a.date||"").localeCompare(b.date||""));
  if (rows.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="6">まだ申請がありません</td></tr>`;
  }
  for (const r of rows) {
    used += Number(r.amount || 0);
    const hasReceipt = !!r.receiptData;
    const receiptCell = hasReceipt
      ? `<img class="image-thumb" src="${escapeHtml(r.receiptData)}" alt="receipt" data-act="view" data-id="${r.id}" data-kind="welfit" />`
      : `<span style="color:#999;font-size:12px;">なし</span>`;
    const applied = r.applied === true || r.applied === "申請済";
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${escapeHtml(r.date || "")}</td>
      <td class="num">${fmtYen(r.amount)}</td>
      <td>
        <button class="applied-toggle ${applied ? "on" : "off"}" data-act="toggle" data-kind="welfit" data-id="${r.id}">
          <span class="dot"></span>${applied ? "申請済" : "未申請"}
        </button>
      </td>
      <td>${receiptCell}</td>
      <td>${escapeHtml(r.note || "")}</td>
      <td>
        <div class="action-btns">
          <button class="icon-btn" data-act="edit" data-kind="welfit" data-id="${r.id}">✏️</button>
          <button class="icon-btn danger" data-act="del" data-kind="welfit" data-id="${r.id}">🗑</button>
        </div>
      </td>`;
    tbody.appendChild(tr);
  }
  const remain = state.budgets.welfit - used;
  $("welfitRemain").textContent = fmtYen(remain);
  $("welfitRemainCard").classList.toggle("negative", remain < 0);
}

// ===== 表示: エキスパート基金 =====
function renderExpert() {
  const tbody = $("expertRows");
  tbody.innerHTML = "";
  let used = 0;
  const rows = [...state.expert].sort((a,b) => (a.date||"").localeCompare(b.date||""));
  if (rows.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="7">まだ申請がありません</td></tr>`;
  }
  for (const r of rows) {
    used += Number(r.amount || 0);
    const hasReceipt = !!r.receiptData;
    const titles = getBookTitles(r);
    const titleNorms = titles.map(normalizeTitle);
    const dupCount = titles.filter((_, i) =>
      state.expertAll.some(e =>
        getBookTitles(e).some(t => normalizeTitle(t) === titleNorms[i]) &&
        !(e.year === state.year && e.id === r.id)
      )
    ).length;
    const dupMark = dupCount ? ` <span title="他に同名あり" style="color:#c00">⚠</span>` : "";
    const titlesHtml = titles.length
      ? titles.map(t => escapeHtml(t)).join("<br>")
      : `<span style="color:#999">—</span>`;
    const receiptCell = hasReceipt
      ? `<img class="image-thumb" src="${escapeHtml(r.receiptData)}" alt="receipt" data-act="view" data-id="${r.id}" data-kind="expert" />`
      : `<span style="color:#999;font-size:12px;">なし</span>`;
    const applied = r.applied === true || r.applied === "申請済";
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${escapeHtml(r.date || "")}</td>
      <td class="num">${fmtYen(r.amount)}</td>
      <td>
        <button class="applied-toggle ${applied ? "on" : "off"}" data-act="toggle" data-kind="expert" data-id="${r.id}">
          <span class="dot"></span>${applied ? "申請済" : "未申請"}
        </button>
      </td>
      <td>${titlesHtml}${dupMark}</td>
      <td>${receiptCell}</td>
      <td>${escapeHtml(r.note || "")}</td>
      <td>
        <div class="action-btns">
          <button class="icon-btn" data-act="edit" data-kind="expert" data-id="${r.id}">✏️</button>
          <button class="icon-btn danger" data-act="del" data-kind="expert" data-id="${r.id}">🗑</button>
        </div>
      </td>`;
    tbody.appendChild(tr);
  }
  const remain = state.budgets.expert - used;
  $("expertRemain").textContent = fmtYen(remain);
  $("expertRemainCard").classList.toggle("negative", remain < 0);
}

// ===== 書籍重複一覧 =====
function renderBookList(filter = "") {
  const body = $("bookListBody");
  body.innerHTML = "";
  const norm = normalizeTitle(filter);

  // 全エントリを (書籍, app) のペアにflatten
  const flat = [];
  state.expertAll.forEach(e => {
    const titles = getBookTitles(e);
    titles.forEach(t => flat.push({ title: t, year: e.year, amount: e.amount, receiptData: e.receiptData, appId: e.id }));
  });

  // 重複カウント
  const counts = new Map();
  flat.forEach(f => {
    const k = normalizeTitle(f.title);
    counts.set(k, (counts.get(k) || 0) + 1);
  });

  const list = flat
    .filter(f => !filter || normalizeTitle(f.title).includes(norm))
    .sort((a,b) => (a.title||"").localeCompare(b.title||"", "ja"));

  for (const f of list) {
    const isDup = counts.get(normalizeTitle(f.title)) > 1;
    const tr = document.createElement("tr");
    if (isDup) tr.classList.add("dup-hit");
    const receipt = f.receiptData
      ? `<img class="image-thumb" src="${escapeHtml(f.receiptData)}" data-act="view" data-id="${f.appId}" data-kind="expert-all" data-year="${escapeHtml(f.year)}" />`
      : "—";
    tr.innerHTML = `
      <td>${escapeHtml(f.title)}${isDup ? " ⚠重複" : ""}</td>
      <td>${escapeHtml(f.year)}</td>
      <td>${fmtYen(f.amount)}</td>
      <td>${receipt}</td>`;
    body.appendChild(tr);
  }
  if (list.length === 0) {
    body.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#999;padding:16px;">該当する書籍がありません</td></tr>`;
  }
}

// ===== モーダル =====
window.closeModal = () => $("modal").classList.remove("show");
window.closeImageModal = () => $("imageModal").classList.remove("show");

function appendBookTitleRow(value = "") {
  const wrap = $("bookTitlesList");
  const idx = wrap.children.length + 1;
  const row = document.createElement("div");
  row.className = "book-title-row";
  row.innerHTML = `
    <input type="text" placeholder="書籍名 ${idx}" />
    <button type="button" class="remove" title="削除">×</button>`;
  row.querySelector("input").value = value;
  row.querySelector("input").addEventListener("input", checkModalDup);
  row.querySelector(".remove").onclick = () => {
    if (wrap.children.length > 1) {
      row.remove();
    } else {
      row.querySelector("input").value = "";
    }
    checkModalDup();
  };
  wrap.appendChild(row);
  return row;
}

function renderBookTitleInputs(titles) {
  const wrap = $("bookTitlesList");
  wrap.innerHTML = "";
  const list = titles.length ? titles : [""];
  list.forEach(t => appendBookTitleRow(t));
}

function getBookTitlesFromForm() {
  return [...$("bookTitlesList").querySelectorAll("input")]
    .map(i => i.value.trim())
    .filter(v => v);
}

function openModal(kind, row) {
  state.pendingReceiptFile = null;
  $("f_kind").value = kind;
  $("f_id").value = row ? row.id : "";
  $("modalTitle").textContent = (row ? "編集" : "追加") + (kind === "welfit" ? " — Wel-fit" : " — エキスパート基金");
  $("f_date").value = row?.date || new Date().toISOString().slice(0,10);
  $("f_amount").value = row?.amount ?? "";
  $("f_note").value = row?.note || "";
  $("f_receipt").value = "";
  $("f_existingReceiptData").value = row?.receiptData || "";
  document.querySelectorAll(".expert-only").forEach(el => {
    el.style.display = kind === "expert" ? "" : "none";
  });
  renderBookTitleInputs(row ? getBookTitles(row) : []);
  if (row?.receiptData) {
    $("f_receiptImg").src = row.receiptData;
    $("f_receiptPreview").classList.remove("hidden");
  } else {
    $("f_receiptPreview").classList.add("hidden");
  }
  checkModalDup();
  $("modal").classList.add("show");
}

function checkModalDup() {
  const kind = $("f_kind").value;
  const warn = $("f_dupWarn");
  if (kind !== "expert") { warn.classList.add("hidden"); return; }
  const titles = getBookTitlesFromForm();
  const editingId = $("f_id").value;
  if (titles.length === 0) { warn.classList.add("hidden"); return; }
  const dups = [];
  for (const t of titles) {
    const norm = normalizeTitle(t);
    const hits = state.expertAll.filter(e =>
      getBookTitles(e).some(et => normalizeTitle(et) === norm) &&
      e.id !== editingId
    );
    if (hits.length > 0) {
      dups.push(`「${t}」: ${hits.length}件（${hits.map(h => h.year + "年度").join(", ")}）`);
    }
  }
  if (dups.length === 0) { warn.classList.add("hidden"); return; }
  warn.innerHTML = `⚠ 重複の可能性:<br>${dups.join("<br>")}`;
  warn.classList.remove("hidden");
}

async function saveModal(e) {
  e.preventDefault();
  if (!state.user) return;
  const saveBtn = $("saveBtn");
  saveBtn.disabled = true;
  saveBtn.textContent = "保存中…";
  try {
    const uid = state.user.uid;
    const kind = $("f_kind").value;
    const id = $("f_id").value;

    const data = {
      date: $("f_date").value,
      amount: Number($("f_amount").value || 0),
      note: $("f_note").value || "",
      updatedAt: serverTimestamp()
    };
    if (kind === "expert") {
      data.bookTitles = getBookTitlesFromForm();
      data.bookTitle = null;
    }
    if (state.pendingReceiptFile) {
      saveBtn.textContent = "画像を圧縮中…";
      data.receiptData = await compressImageToDataUrl(state.pendingReceiptFile);
    } else {
      data.receiptData = $("f_existingReceiptData").value || "";
    }

    saveBtn.textContent = "保存中…";
    await setDoc(yearDocRef(uid, state.year), { year: state.year }, { merge: true });

    if (id) {
      await setDoc(doc(appsCol(uid, state.year, kind), id), data, { merge: true });
    } else {
      data.applied = false;
      data.createdAt = serverTimestamp();
      await addDoc(appsCol(uid, state.year, kind), data);
    }
    closeModal();
    await loadAll();
  } catch (err) {
    console.error(err);
    alert("保存失敗: " + err.message);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = "保存";
  }
}

async function toggleApplied(kind, id) {
  const uid = state.user.uid;
  const list = kind === "welfit" ? state.welfit : state.expert;
  const row = list.find(r => r.id === id);
  if (!row) return;
  const current = row.applied === true || row.applied === "申請済";
  const next = !current;
  // 楽観更新
  row.applied = next;
  if (kind === "welfit") renderWelfit(); else renderExpert();
  try {
    await updateDoc(doc(appsCol(uid, state.year, kind), id), {
      applied: next, updatedAt: serverTimestamp()
    });
  } catch (e) {
    alert("更新失敗: " + e.message);
    await loadAll();
  }
}

async function deleteRow(kind, id) {
  if (!confirm("削除しますか？")) return;
  const uid = state.user.uid;
  await deleteDoc(doc(appsCol(uid, state.year, kind), id));
  await loadAll();
}

function openImageView(url) {
  $("imageModalImg").src = url;
  $("imageDownloadLink").href = url;
  $("imageModal").classList.add("show");
}

// ===== 予算編集 =====
async function saveBudget(kind) {
  if (!state.user) return;
  const uid = state.user.uid;
  const input = kind === "welfit" ? $("welfitBudgetInput") : $("expertBudgetInput");
  const val = Number(input.value);
  if (!Number.isFinite(val) || val < 0) {
    input.value = state.budgets[kind];
    return;
  }
  state.budgets[kind] = val;
  try {
    await setDoc(yearDocRef(uid, state.year), {
      year: state.year,
      [kind === "welfit" ? "welfitBudget" : "expertBudget"]: val
    }, { merge: true });
    if (kind === "welfit") renderWelfit(); else renderExpert();
  } catch (e) {
    alert("予算保存失敗: " + e.message);
  }
}

// ===== イベント =====
function bindEvents() {
  $("loginBtn").onclick = () => signInWithPopup(auth, provider).catch(err => alert("ログイン失敗: " + err.message));
  $("logoutBtn").onclick = () => signOut(auth);
  $("addWelfit").onclick = () => openModal("welfit", null);
  $("addExpert").onclick = () => openModal("expert", null);
  $("modalForm").onsubmit = saveModal;
  $("bookSearch").addEventListener("input", e => renderBookList(e.target.value));

  $("addBookTitleBtn").onclick = () => {
    const row = appendBookTitleRow("");
    row.querySelector("input").focus();
    checkModalDup();
  };

  $("welfitBudgetInput").addEventListener("change", () => saveBudget("welfit"));
  $("welfitBudgetInput").addEventListener("blur", () => saveBudget("welfit"));
  $("expertBudgetInput").addEventListener("change", () => saveBudget("expert"));
  $("expertBudgetInput").addEventListener("blur", () => saveBudget("expert"));

  $("f_receipt").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 20 * 1024 * 1024) {
      alert("画像サイズが大きすぎます（20MB以下にしてください）");
      e.target.value = "";
      return;
    }
    state.pendingReceiptFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      $("f_receiptImg").src = ev.target.result;
      $("f_receiptPreview").classList.remove("hidden");
    };
    reader.readAsDataURL(file);
  });

  $("f_removeReceipt").onclick = () => {
    state.pendingReceiptFile = null;
    $("f_receipt").value = "";
    $("f_existingReceiptData").value = "";
    $("f_receiptPreview").classList.add("hidden");
  };

  document.body.addEventListener("click", e => {
    const btn = e.target.closest("button[data-act], img[data-act]");
    if (!btn) return;
    const { act, kind, id, year } = btn.dataset;
    if (act === "view") {
      let row;
      if (kind === "expert-all") {
        row = state.expertAll.find(r => r.id === id && r.year === year);
      } else {
        const list = kind === "welfit" ? state.welfit : state.expert;
        row = list.find(r => r.id === id);
      }
      if (row?.receiptData) openImageView(row.receiptData);
      return;
    }
    if (act === "toggle") { toggleApplied(kind, id); return; }
    const list = kind === "welfit" ? state.welfit : state.expert;
    const row = list.find(r => r.id === id);
    if (act === "edit") openModal(kind, row);
    if (act === "del") deleteRow(kind, id);
  });

  window.addEventListener("click", e => {
    if (e.target.id === "modal") closeModal();
    if (e.target.id === "imageModal") closeImageModal();
  });
}

onAuthStateChanged(auth, async user => {
  state.user = user;
  if (user) {
    $("userInfo").textContent = "👤 " + (user.displayName || user.email || "ログイン中");
    $("loginBtn").classList.add("hidden");
    $("logoutBtn").classList.remove("hidden");
    $("signinNotice").classList.add("hidden");
    $("appBody").classList.remove("hidden");
    await loadAll();
  } else {
    $("userInfo").textContent = "未ログイン";
    $("loginBtn").classList.remove("hidden");
    $("logoutBtn").classList.add("hidden");
    $("signinNotice").classList.remove("hidden");
    $("appBody").classList.add("hidden");
  }
});

buildYearSelector();
setupTabs();
bindEvents();
// 初期表示（未ログイン時の空状態）
$("welfitBudgetInput").value = state.budgets.welfit;
$("expertBudgetInput").value = state.budgets.expert;
</script>
