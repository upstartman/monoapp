        .sync-indicator.syncing { background:#f59e0b; animation:pulse 1s infinite; }
        .sync-indicator.error { background:#ef4444; }

        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }

        .section-line { flex:1; height:1px; background:linear-gradient(90deg,var(--glass-border),transparent); }

        .year-2026 .card-visual,.year-2026 .year-badge { background:linear-gradient(135deg,#8b5cf6,#6366f1); }
        .year-2025 .card-visual,.year-2025 .year-badge { background:linear-gradient(135deg,#ec4899,#f472b6); }
        .year-2024 .card-visual,.year-2024 .year-badge { background:linear-gradient(135deg,#06b6d4,#22d3ee); }

        .modal { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }

        .modal-close { width:36px; height:36px; background:var(--glass); border:none; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .modal-close svg { width:20px; height:20px; fill:var(--text-primary); }
        .modal-body { padding:20px; }
        .form-group { margin-bottom:20px; }
        .form-group label { display:block; font-size:14px; font-weight:500; margin-bottom:8px; color:var(--text-secondary); }
        .form-group input,.form-group select,.form-group textarea { width:100%; padding:14px 16px; background:var(--glass); border:1px solid var(--glass-border); border-radius:12px; color:var(--text-primary); font-size:15px; font-family:inherit; }

        .btn-primary { background:linear-gradient(135deg,var(--primary),var(--accent)); color:white; }

        .edit-mode-banner { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,#ef4444,#f97316); padding:12px 24px; border-radius:50px; font-size:14px; font-weight:500; z-index:150; display:none; align-items:center; gap:10px; box-shadow:0 8px 32px rgba(239,68,68,0.4); }

    </style>
</head>

<script>

const firebaseConfig = {

// 初期データ

// Toast表示
function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// 同期インジケーター更新
function setSyncStatus(status) {
    const indicator = document.getElementById('syncIndicator');
    indicator.className = 'sync-indicator' + (status === 'syncing' ? ' syncing' : status === 'error' ? ' error' : '');
}

// Firestoreからデータ読み込み（リアルタイムリスナー）
function startRealtimeSync() {
    unsubscribe = db.collection('settings').doc('videoData')
        .onSnapshot((doc) => {
            if (doc.exists) {
                videoData = doc.data().data || {};
                // 年度がない場合は空配列で初期化
                years.forEach(y => {
                    if (!videoData[y]) videoData[y] = [];
                });
            } else {
                // 初回：デフォルトデータで初期化
                videoData = JSON.parse(JSON.stringify(defaultData));
                saveToFirestore();
            }
            renderContent();
            document.getElementById('loadingOverlay').style.display = 'none';
            setSyncStatus('synced');
        }, (error) => {
            console.error('Firestore error:', error);
            setSyncStatus('error');
            showToast('同期エラー', true);
            document.getElementById('loadingOverlay').style.display = 'none';
        });
}

// Firestoreに保存
async function saveToFirestore() {
    setSyncStatus('syncing');
    try {
        await db.collection('settings').doc('videoData').set({
            data: videoData,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        setSyncStatus('synced');
    } catch (error) {
        console.error('Save error:', error);
        setSyncStatus('error');
        showToast('保存エラー', true);
    }
}

// YouTube URL解析
function parseYouTubeUrl(url) {
    const r = {playlistId: null, videoId: null};
    try {
        const u = new URL(url);
        r.playlistId = u.searchParams.get('list');
        r.videoId = u.searchParams.get('v');
        if (u.hostname === 'youtu.be') r.videoId = u.pathname.slice(1);
    } catch(e) {}
    return r;
}

// ナビゲーション描画
function renderNav() {
    const nav = document.getElementById('navDrawer');
    let h = '<div class="nav-drawer-item active" data-page="home" onclick="showPage(\'home\')">🏠 ホーム</div>';
    years.forEach(y => {
        h += `<div class="nav-drawer-item" data-page="${y}" onclick="showPage('${y}')">📅 ${y}年</div>`;
    });
    nav.innerHTML = h;
}

// コンテンツ描画
function renderContent() {
    const main = document.getElementById('mainContent');
    let h = `<div class="page active" id="page-home">
        <section class="hero">
            <div class="hero-badge"><span></span>家族の思い出</div>
            <h1 class="hero-title">野茂家の<br><span class="gradient">Youtube再生リスト集</span></h1>
            <p class="hero-subtitle">大切な家族の思い出を年別に整理。<br>いつでも振り返れる動画コレクション。</p>
        </section>
        <section>
            <div class="section-title"><h2>📅 年別アーカイブ</h2><div class="section-line"></div></div>
            <div class="cards-grid">`;

    years.forEach(y => {
        const d = videoData[y] || [];
        const c = d.reduce((s,m) => s + m.videos.length, 0);
        const desc = c > 0 ? `${c}件の再生リスト` : '準備中';
        h += `<div class="year-card year-${y}" onclick="showPage('${y}')">
            <div class="card-visual"><span class="card-year">${y}</span></div>
            <div class="card-content"><div class="card-title">${y}年の記録</div><div class="card-description">${desc}</div></div>
            <div class="card-arrow"><svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg></div>
        </div>`;
    });
    h += `</div></section></div>`;

    years.forEach(y => {
        const d = videoData[y] || [];
        h += `<div class="page year-${y}" id="page-${y}">
            <div class="year-page-header">
                <button class="back-button" onclick="showPage('home')"><svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>戻る</button>
                <div class="year-page-title"><div class="year-badge">${y}</div><div class="year-page-info"><h1>${y}年の思い出</h1><p>動画コレクション</p></div></div>
            </div>`;

        if (d.length === 0) {
            h += `<div class="empty-page"><div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg></div><h2>準備中</h2><p>右上の＋ボタンから動画を追加できます</p></div>`;
        } else {
            d.forEach(md => {
                h += `<div class="video-section"><div class="month-title"><h3>${md.emoji} ${md.month}</h3><span class="month-count">${md.videos.length}件</span></div>`;
                md.videos.forEach((v, i) => {
                    const pUrl = `https://www.youtube.com/playlist?list=${v.playlistId}`;
                    const tUrl = v.videoId ? `https://i.ytimg.com/vi/${v.videoId}/hqdefault.jpg` : `https://i.ytimg.com/vi/${v.playlistId}/hqdefault.jpg`;
                    h += `<a href="${pUrl}" target="_blank" class="video-card">
                        <button class="delete-btn" onclick="deleteVideo(event,'${y}','${md.month}',${i})"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
                        <div class="video-thumbnail">
                            <img src="${tUrl}" alt="${v.title}" onerror="this.style.display='none'">
                            <div class="video-thumbnail-overlay"><div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
                            <div class="playlist-tag"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>再生リスト</div>
                        </div>
                        <div class="video-info"><h3>${v.title}</h3><p>${v.description||''}</p><div class="video-meta"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 16H6c-.55 0-1-.45-1-1V6c0-.55.45-1 1-1h12c.55 0 1 .45 1 1v12c0 .55-.45 1-1 1z"/></svg>${v.date||''}</div></div>
                    </a>`;
                });
                h += `</div>`;
            });
        }
        h += `</div>`;
    });

    main.innerHTML = h;
    if (editMode) document.querySelectorAll('.page').forEach(p => p.classList.add('edit-mode'));
}

// ページ切替
function showPage(id) {
    document.getElementById('navDrawer').classList.remove('open');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${id}`).classList.add('active');
    document.querySelectorAll('.nav-drawer-item').forEach(i => {
        i.classList.remove('active');
        if (i.dataset.page === id) i.classList.add('active');
    });
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function toggleMenu() {
    document.getElementById('navDrawer').classList.toggle('open');
}

// 追加モーダル
function openAddModal() {
    document.getElementById('addModal').classList.add('open');
    document.getElementById('youtubeUrl').value = '';
    document.getElementById('videoTitle').value = '';
    document.getElementById('videoDesc').value = '';
    document.getElementById('videoDate').value = '';
    document.getElementById('previewArea').style.display = 'none';
    document.getElementById('addBtn').disabled = true;
    parsedUrl = null;
    const ys = document.getElementById('videoYear');
    ys.innerHTML = years.map(y => `<option value="${y}">${y}年</option>`).join('');
    document.getElementById('videoMonth').value = `${new Date().getMonth()+1}月`;
}

function closeAddModal() {
    document.getElementById('addModal').classList.remove('open');
}

document.getElementById('youtubeUrl').addEventListener('input', function() {
    const url = this.value.trim();
    parsedUrl = parseYouTubeUrl(url);
    if (parsedUrl.playlistId || parsedUrl.videoId) {
        const tUrl = parsedUrl.videoId ? `https://i.ytimg.com/vi/${parsedUrl.videoId}/hqdefault.jpg` : null;
        if (tUrl) {
            document.getElementById('previewThumb').src = tUrl;
            document.getElementById('previewArea').style.display = 'block';
            document.getElementById('previewInfo').textContent = `再生リストID: ${parsedUrl.playlistId || 'なし'}`;
        } else {
            document.getElementById('previewArea').style.display = 'none';
        }
        updateAddButton();
    } else {
        document.getElementById('previewArea').style.display = 'none';
        document.getElementById('addBtn').disabled = true;
    }
});

document.getElementById('videoTitle').addEventListener('input', updateAddButton);

function updateAddButton() {
    const t = document.getElementById('videoTitle').value.trim();
    const hasUrl = parsedUrl && parsedUrl.playlistId;
    document.getElementById('addBtn').disabled = !(t && hasUrl);
}

async function addVideo() {
    if (!parsedUrl || !parsedUrl.playlistId) return;
    
    const title = document.getElementById('videoTitle').value.trim();
    const desc = document.getElementById('videoDesc').value.trim();
    const year = document.getElementById('videoYear').value;
    const month = document.getElementById('videoMonth').value;
    const date = document.getElementById('videoDate').value.trim();
    
    const newV = {
        title,
        description: desc,
        date,
        playlistId: parsedUrl.playlistId,
        videoId: parsedUrl.videoId || ''
    };
    
    if (!videoData[year]) videoData[year] = [];
    
    let md = videoData[year].find(m => m.month === month);
    if (!md) {
        md = {month, emoji: monthEmojis[month] || "📅", videos: []};
        videoData[year].push(md);
        videoData[year].sort((a, b) => parseInt(b.month) - parseInt(a.month));
    }
    md.videos.push(newV);
    
    await saveToFirestore();
    showToast('動画を追加しました');
    closeAddModal();
    showPage(year);
}

function toggleEditMode() {
    editMode = !editMode;
    document.getElementById('editBanner').classList.toggle('show', editMode);
    document.querySelectorAll('.page').forEach(p => p.classList.toggle('edit-mode', editMode));
    closeAddModal();
}

async function deleteVideo(e, y, m, i) {
    e.preventDefault();
    e.stopPropagation();
    if (!confirm('この動画を削除しますか？')) return;
    
    const md = videoData[y].find(x => x.month === m);
    if (md) {
        md.videos.splice(i, 1);
        if (md.videos.length === 0) {
            const mi = videoData[y].indexOf(md);
            videoData[y].splice(mi, 1);
        }
        await saveToFirestore();
        showToast('動画を削除しました');
    }
}

// 初期化
renderNav();
startRealtimeSync();
</script>
