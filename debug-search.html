<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>書籍検索 - デバッグ版</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 p-4">
  
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">📚 書籍検索（デバッグ版）</h1>
    
    <!-- 検索 -->
    <div class="bg-white rounded-lg p-4 mb-4 shadow">
      <div class="space-y-3">
        <div>
          <label class="block text-sm font-medium mb-1">キーワード</label>
          <input type="text" id="keyword" value="Python" class="w-full px-3 py-2 border rounded">
        </div>
        <button onclick="searchBooks()" id="searchBtn" class="w-full px-4 py-2 bg-amber-500 text-white rounded hover:bg-amber-600">
          検索テスト
        </button>
      </div>
    </div>

    <!-- デバッグ情報 -->
    <div class="bg-yellow-50 rounded-lg p-4 mb-4 shadow border border-yellow-200">
      <h2 class="font-bold mb-2">🔍 デバッグログ</h2>
      <pre id="debugLog" class="text-xs bg-gray-800 text-green-400 p-3 rounded overflow-x-auto whitespace-pre-wrap h-64 overflow-y-auto">検索ボタンを押してください...</pre>
    </div>

    <!-- 結果 -->
    <div class="bg-white rounded-lg p-4 shadow">
      <h2 class="font-bold mb-2">📖 検索結果</h2>
      <div id="results" class="text-sm">検索結果がここに表示されます</div>
    </div>
  </div>

  <script>
    // APIキー
    const APP_ID = 'f73e85f4-2fa7-4c54-92f6-bec5df99e574';
    const ACCESS_KEY = 'pk_tGwZPVUnMxqhyTKA5UBTZJpqno2UXi';

    function log(msg) {
      const el = document.getElementById('debugLog');
      const time = new Date().toLocaleTimeString();
      el.textContent += `\n[${time}] ${msg}`;
      el.scrollTop = el.scrollHeight;
      console.log(msg);
    }

    async function searchBooks() {
      document.getElementById('debugLog').textContent = '=== 検索開始 ===';
      document.getElementById('results').innerHTML = '検索中...';

      const keyword = document.getElementById('keyword').value.trim();
      
      log('キーワード: ' + keyword);
      log('APP_ID: ' + APP_ID.substring(0, 8) + '...');
      log('ACCESS_KEY: ' + ACCESS_KEY.substring(0, 8) + '...');
      log('現在のURL: ' + window.location.href);
      log('ホスト: ' + window.location.host);

      const params = new URLSearchParams({
        applicationId: APP_ID,
        accessKey: ACCESS_KEY,
        title: keyword,
        hits: 5,
        sort: 'standard',
        outOfStockFlag: 1,
        formatVersion: 2,
        format: 'json'
      });

      const url = `https://openapi.rakuten.co.jp/services/api/BooksBook/Search/20170404?${params.toString()}`;
      
      log('リクエストURL: ' + url.substring(0, 100) + '...');

      try {
        log('Fetch開始...');
        const response = await fetch(url);
        log('HTTPステータス: ' + response.status);
        log('HTTPステータステキスト: ' + response.statusText);
        
        const responseText = await response.text();
        log('レスポンス長さ: ' + responseText.length + '文字');
        log('レスポンス先頭200文字: ' + responseText.substring(0, 200));

        let data;
        try {
          data = JSON.parse(responseText);
          log('JSONパース成功');
        } catch (e) {
          log('❌ JSONパースエラー: ' + e.message);
          document.getElementById('results').innerHTML = '<span class="text-red-500">JSONパースエラー</span>';
          return;
        }

        if (data.error) {
          log('❌ APIエラー: ' + data.error);
          log('エラー詳細: ' + data.error_description);
          document.getElementById('results').innerHTML = `<span class="text-red-500">エラー: ${data.error} - ${data.error_description}</span>`;
          return;
        }

        if (data.errors) {
          log('❌ APIエラー(errors): ' + JSON.stringify(data.errors));
          document.getElementById('results').innerHTML = `<span class="text-red-500">エラー: ${JSON.stringify(data.errors)}</span>`;
          return;
        }

        log('✅ 成功!');
        log('総件数(count): ' + data.count);
        log('取得件数(Items): ' + (data.Items ? data.Items.length : 0));

        if (data.Items && data.Items.length > 0) {
          log('最初の書籍: ' + data.Items[0].title);
          
          const html = data.Items.map(book => `
            <div class="border-b py-2">
              <p class="font-medium">${book.title}</p>
              <p class="text-gray-500 text-xs">${book.author} / ${book.publisherName}</p>
              <p class="text-amber-600 font-bold">${book.itemPrice}円</p>
            </div>
          `).join('');
          
          document.getElementById('results').innerHTML = html;
        } else {
          log('結果が0件でした');
          document.getElementById('results').innerHTML = '結果が見つかりませんでした';
        }

      } catch (err) {
        log('❌ 例外エラー: ' + err.name);
        log('エラーメッセージ: ' + err.message);
        log('スタック: ' + err.stack);
        document.getElementById('results').innerHTML = `<span class="text-red-500">エラー: ${err.message}</span>`;
      }
    }
  </script>
</body>
</html>
