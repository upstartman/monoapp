<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f1226" />
<title>Welfit</title>
<style>
  :root {
    --bg-1: #0f1226;
    --bg-2: #1c1f3e;
    --bg-3: #2a2d5a;
    --card: rgba(255,255,255,0.06);
    --card-strong: rgba(255,255,255,0.10);
    --border: rgba(255,255,255,0.10);
    --text: #f3f4ff;
    --text-dim: #a8accc;
    --accent: #7c9cff;
    --accent-2: #b691ff;
    --good: #4cd6a0;
    --warn: #ffc857;
    --bad: #ff6b6b;
    --gradient: linear-gradient(135deg, #7c9cff 0%, #b691ff 100%);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
    background: radial-gradient(1200px 800px at 20% -10%, #2a2d5a 0%, transparent 60%),
                radial-gradient(1000px 700px at 110% 110%, #4a2d6a 0%, transparent 60%),
                var(--bg-1);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    padding: 12px;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  /* ===== ヘッダー ===== */
  header.app {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; margin-bottom: 14px;
  }
  .brand {
    display: flex; align-items: center; gap: 8px;
    font-size: 18px; font-weight: 800; letter-spacing: .02em;
  }
  .brand .logo {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--gradient);
    display: grid; place-items: center;
    font-size: 14px;
    box-shadow: 0 4px 16px rgba(124,156,255,.35);
  }
  .header-right { display: flex; align-items: center; gap: 6px; }
  .year-select, .icon-button {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 999px;
    padding: 6px 12px; font-size: 13px; font-weight: 600;
    cursor: pointer; outline: none;
    backdrop-filter: blur(8px);
  }
  .year-select:focus, .icon-button:focus-visible { border-color: var(--accent); }
  .user-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 999px;
    padding: 4px 10px; font-size: 12px;
  }
  .user-chip .avatar {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--gradient); color: #fff;
    display: grid; place-items: center; font-size: 10px; font-weight: 800;
  }

  /* ===== ボタン ===== */
  .btn {
    appearance: none; border: none; cursor: pointer;
    padding: 10px 16px; border-radius: 12px;
    font-size: 14px; font-weight: 700; letter-spacing: .01em;
    transition: transform .08s ease, box-shadow .2s ease, background .2s;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--gradient); color: #0f1226;
    box-shadow: 0 8px 24px rgba(124,156,255,.35);
  }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-secondary {
    background: var(--card-strong); color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: rgba(255,255,255,.12); }
  .btn-danger { background: rgba(255,107,107,.18); color: var(--bad); border: 1px solid rgba(255,107,107,.3); }
  .btn-danger:hover { background: rgba(255,107,107,.28); }
  .btn-ghost {
    background: transparent; color: var(--text-dim);
    border: 1px dashed var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-block { display: block; width: 100%; }

  /* ===== サインインカード ===== */
  .signin-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 28px 20px; text-align: center;
    backdrop-filter: blur(12px);
  }
  .signin-card p { color: var(--text-dim); margin-bottom: 16px; font-size: 14px; }

  /* ===== タブ ===== */
  .tabs {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px; padding: 4px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; margin-bottom: 14px;
    backdrop-filter: blur(8px);
  }
  .tab {
    background: transparent; border: none; cursor: pointer;
    padding: 10px 12px; border-radius: 10px;
    color: var(--text-dim); font-size: 14px; font-weight: 700;
    transition: all .2s;
  }
  .tab.active {
    background: var(--gradient); color: #0f1226;
    box-shadow: 0 4px 16px rgba(124,156,255,.25);
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: translateY(0);} }

  /* ===== スタッツカード（残ポイント目立たせる） ===== */
  .stats {
    display: grid; gap: 10px; margin-bottom: 14px;
  }
  .stat {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(8px);
  }
  .stat .label { font-size: 12px; color: var(--text-dim); font-weight: 600; }
  .stat .value { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); }
  .stat-budget .value-edit {
    display: flex; align-items: center; gap: 4px;
    color: var(--text-dim);
  }
  .stat-budget input {
    background: transparent; border: none; outline: none;
    color: var(--text-dim); font-size: 14px; font-weight: 600;
    text-align: right; font-variant-numeric: tabular-nums;
    width: 100px; padding: 2px 4px; border-bottom: 1px dashed transparent;
    transition: border-color .2s;
  }
  .stat-budget input:hover { border-bottom-color: var(--border); }
  .stat-budget input:focus { border-bottom-color: var(--accent); color: var(--text); }
  .stat-remain {
    background: linear-gradient(135deg, rgba(76,214,160,.18) 0%, rgba(124,156,255,.12) 100%);
    border: 1px solid rgba(76,214,160,.28);
    padding: 18px 20px;
  }
  .stat-remain .label { font-size: 13px; color: var(--good); text-transform: uppercase; letter-spacing: .08em; }
  .stat-remain .value {
    font-size: 32px; font-weight: 800; color: var(--good);
    text-shadow: 0 2px 24px rgba(76,214,160,.3);
  }
  .stat-remain.negative {
    background: linear-gradient(135deg, rgba(255,107,107,.18) 0%, rgba(255,200,87,.12) 100%);
    border-color: rgba(255,107,107,.32);
  }
  .stat-remain.negative .label,
  .stat-remain.negative .value { color: var(--bad); }

  /* ===== リストカード ===== */
  .list {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 6px;
    backdrop-filter: blur(8px); margin-bottom: 12px;
  }
  .item {
    display: grid; grid-template-columns: 1fr auto;
    gap: 8px; padding: 12px;
    border-radius: 10px;
    align-items: center;
    transition: background .15s;
  }
  .item + .item { border-top: 1px solid var(--border); }
  .item:hover { background: rgba(255,255,255,.04); }
  .item .main { min-width: 0; }
  .item .row1 {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 4px;
  }
  .item .amount {
    font-size: 18px; font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .item .date { font-size: 12px; color: var(--text-dim); }
  .item .row2 {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    font-size: 13px; color: var(--text-dim);
  }
  .item .title-list {
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .item .title-pill {
    background: rgba(124,156,255,.14);
    color: var(--text);
    border: 1px solid rgba(124,156,255,.25);
    padding: 2px 8px; border-radius: 999px;
    font-size: 11px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .item .title-pill.dup { background: rgba(255,107,107,.18); border-color: rgba(255,107,107,.3); color: #ffb0b0; }
  .item .title-pill .amt { color: var(--text-dim); font-size: 10px; }
  .item .note { font-style: italic; }
  .item .actions { display: flex; gap: 4px; align-items: center; }
  .icon-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-dim); width: 32px; height: 32px;
    border-radius: 8px; cursor: pointer; display: grid; place-items: center;
    transition: all .15s;
  }
  .icon-btn:hover { background: rgba(255,255,255,.08); color: var(--text); }
  .icon-btn.danger:hover { background: rgba(255,107,107,.15); color: var(--bad); border-color: rgba(255,107,107,.4); }

  .applied-toggle {
    appearance: none; border: 1px solid var(--border);
    background: rgba(255,255,255,.04);
    color: var(--text-dim);
    padding: 4px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 700; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
    transition: all .15s;
  }
  .applied-toggle .dot {
    width: 6px; height: 6px; border-radius: 50%; background: currentColor;
  }
  .applied-toggle.on {
    background: rgba(76,214,160,.18); color: var(--good);
    border-color: rgba(76,214,160,.35);
  }
  .applied-toggle:hover { filter: brightness(1.15); }

  .receipt-thumb {
    width: 36px; height: 36px; border-radius: 8px; object-fit: cover;
    cursor: pointer; border: 1px solid var(--border);
  }
  .receipt-empty {
    width: 36px; height: 36px; border-radius: 8px;
    background: rgba(255,255,255,.03); border: 1px dashed var(--border);
    display: grid; place-items: center; color: var(--text-dim); font-size: 14px;
  }

  .empty {
    text-align: center; padding: 28px 16px; color: var(--text-dim);
    font-size: 13px;
  }

  /* ===== 重複チェック / 過去登録 ===== */
  .section-title {
    font-size: 13px; color: var(--text-dim); font-weight: 700;
    text-transform: uppercase; letter-spacing: .12em;
    margin: 22px 0 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .dup-explain {
    font-size: 11px; color: var(--text-dim); font-weight: 400;
    text-transform: none; letter-spacing: 0; margin-top: 4px;
    line-height: 1.5;
  }
  .dup-section input[type="search"] {
    width: 100%; padding: 10px 14px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 12px;
    font-size: 14px; margin-bottom: 8px;
  }
  .dup-section input[type="search"]:focus { outline: none; border-color: var(--accent); }
  .book-row {
    display: grid; grid-template-columns: 1fr auto auto auto;
    gap: 8px; padding: 10px 12px;
    align-items: center; font-size: 13px;
    border-radius: 10px;
  }
  .book-row + .book-row { border-top: 1px solid var(--border); }
  .book-row.dup { background: rgba(255,107,107,.08); }
  .book-row .year { font-size: 11px; color: var(--text-dim); }
  .book-row .amt { font-variant-numeric: tabular-nums; }
  .book-row .dup-badge {
    background: rgba(255,107,107,.18); color: #ffb0b0;
    border: 1px solid rgba(255,107,107,.28);
    border-radius: 999px; padding: 1px 6px; font-size: 10px; font-weight: 700;
  }

  /* ===== モーダル ===== */
  .modal { display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,.6); backdrop-filter: blur(6px);
    padding: 12px; align-items: flex-end; justify-content: center;
  }
  .modal.show { display: flex; }
  @media (min-width: 600px) { .modal { align-items: center; } }
  .modal-content {
    background: linear-gradient(180deg, #1a1d3a 0%, #15182f 100%);
    border: 1px solid var(--border);
    border-radius: 18px 18px 18px 18px;
    width: 100%; max-width: 560px;
    max-height: calc(100vh - 24px); overflow-y: auto;
    padding: 18px; box-shadow: 0 24px 60px rgba(0,0,0,.5);
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(40px);} to { opacity: 1; transform: translateY(0);} }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .modal-header h2 { font-size: 16px; font-weight: 700; }
  .close-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text-dim); width: 30px; height: 30px;
    border-radius: 50%; cursor: pointer; font-size: 18px; line-height: 1;
  }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; font-weight: 600; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 10px 12px;
    background: rgba(255,255,255,.04); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px;
    font-size: 14px; font-family: inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .field input[type="file"] {
    padding: 8px; border-style: dashed; border-color: var(--accent);
    background: rgba(124,156,255,.06);
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .book-input-row {
    display: grid; grid-template-columns: 1fr 110px auto;
    gap: 6px; margin-bottom: 6px; align-items: center;
  }
  .book-input-row input { padding: 8px 10px; font-size: 13px; }
  .book-input-row .remove {
    width: 32px; height: 32px; border-radius: 8px;
    background: rgba(255,107,107,.12); border: 1px solid rgba(255,107,107,.25);
    color: var(--bad); cursor: pointer;
  }
  .book-input-row .remove:hover { background: rgba(255,107,107,.22); }
  .book-total {
    font-size: 12px; color: var(--text-dim); text-align: right; margin-top: 4px;
  }
  .book-total b { color: var(--text); font-size: 14px; }

  .dup-warning {
    background: rgba(255,107,107,.12); color: #ffb0b0;
    border: 1px solid rgba(255,107,107,.28);
    padding: 8px 12px; border-radius: 10px;
    margin: 8px 0; font-size: 12px; line-height: 1.5;
  }
  .image-preview {
    border: 1px solid var(--border); border-radius: 10px;
    padding: 8px; margin-top: 8px;
    background: rgba(255,255,255,.03);
  }
  .image-preview img { max-width: 100%; max-height: 200px; border-radius: 6px; display: block; margin: 0 auto; }
  .modal-actions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px;
  }
  .hidden { display: none !important; }

  /* スクロールバーをスリムに */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.2); }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div class="container">
  <header class="app">
    <div class="brand">
      <div class="logo">💰</div>
      Welfit
    </div>
    <div class="header-right">
      <select id="yearSelect" class="year-select"></select>
      <span id="userChip" class="user-chip hidden"><span class="avatar" id="userAvatar">?</span><span id="userName"></span></span>
      <button id="loginBtn" class="icon-button">ログイン</button>
      <button id="logoutBtn" class="icon-button hidden">↩</button>
    </div>
  </header>

  <div id="signinNotice" class="signin-card">
    <p>Googleでログインすると、申請データを年度別に管理できます。</p>
    <button id="loginBtn2" class="btn btn-primary btn-block">Googleでログイン</button>
  </div>

  <main id="appBody" class="hidden">
    <div class="tabs">
      <button class="tab active" data-tab="welfit">Wel-fit</button>
      <button class="tab" data-tab="expert">エキスパート基金</button>
    </div>

    <!-- Wel-fit タブ -->
    <section id="tab-welfit" class="tab-content active">
      <div class="stats">
        <div class="stat stat-remain" id="welfitRemainCard">
          <span class="label">残ポイント</span>
          <span class="value" id="welfitRemain">¥50,000</span>
        </div>
        <div class="stat stat-budget">
          <span class="label">当年度ポイント</span>
          <span class="value-edit">
            <input type="number" id="welfitBudgetInput" min="0" step="1000" />
            <span>円</span>
          </span>
        </div>
      </div>
      <div class="list" id="welfitList"></div>
      <button id="addWelfit" class="btn btn-primary btn-block">+ 申請を追加</button>
    </section>

    <!-- エキスパート基金 タブ -->
    <section id="tab-expert" class="tab-content">
      <div class="stats">
        <div class="stat stat-remain" id="expertRemainCard">
          <span class="label">残ポイント</span>
          <span class="value" id="expertRemain">¥132,000</span>
        </div>
        <div class="stat stat-budget">
          <span class="label">当年度ポイント</span>
          <span class="value-edit">
            <input type="number" id="expertBudgetInput" min="0" step="1000" />
            <span>円</span>
          </span>
        </div>
      </div>
      <div class="list" id="expertList"></div>
      <button id="addExpert" class="btn btn-primary btn-block">+ 申請を追加</button>

      <div class="dup-section">
        <div class="section-title">
          <span>書籍重複チェック（全年度）</span>
          <button id="addLegacyBtn" class="icon-button" title="過去の書籍を登録">＋ 過去登録</button>
        </div>
        <p class="dup-explain">
          書籍名は全年度・全申請を横断して比較されます。空白の有無、半角/全角、大文字小文字の違いは同一視されます。重複時は警告のみで保存はブロックされません。
        </p>
        <input id="bookSearch" type="search" placeholder="🔍 書籍名で検索…" />
        <div class="list" id="bookListBody"></div>
      </div>
    </section>
  </main>
</div>

<!-- 申請編集モーダル -->
<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">申請を追加</h2>
      <button type="button" class="close-btn" onclick="closeModal()">×</button>
    </div>
    <form id="modalForm">
      <input type="hidden" id="f_id" />
      <input type="hidden" id="f_kind" />
      <input type="hidden" id="f_existingReceiptData" />

      <div class="field"><label>日付 *</label>
        <input type="date" id="f_date" required />
      </div>

      <div class="welfit-only">
        <div class="field"><label>金額(税込) *</label>
          <input type="number" id="f_amount" min="0" step="1" />
        </div>
      </div>

      <div class="expert-only">
        <div class="field">
          <label>書籍と金額</label>
          <div id="bookTitlesList"></div>
          <button type="button" id="addBookTitleBtn" class="btn btn-ghost" style="padding:6px 10px; font-size:12px; margin-top:4px;">+ 書籍を追加</button>
          <div class="book-total">合計: <b id="bookSumDisplay">¥0</b></div>
        </div>
        <div id="f_dupWarn" class="dup-warning hidden"></div>
      </div>

      <div class="field"><label>レシート画像（任意）</label>
        <input type="file" id="f_receipt" accept="image/*" />
        <div id="f_receiptPreview" class="image-preview hidden">
          <img id="f_receiptImg" alt="プレビュー" />
          <div style="margin-top:6px; text-align:right;">
            <button type="button" class="btn btn-danger" id="f_removeReceipt" style="padding:4px 10px; font-size:12px;">画像を削除</button>
          </div>
        </div>
      </div>

      <div class="field"><label>メモ</label>
        <textarea id="f_note" rows="2"></textarea>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">保存</button>
      </div>
    </form>
  </div>
</div>

<!-- 過去書籍登録モーダル -->
<div id="legacyModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>過去の書籍を登録</h2>
      <button type="button" class="close-btn" onclick="closeLegacyModal()">×</button>
    </div>
    <p style="font-size:12px; color: var(--text-dim); margin-bottom: 12px;">
      本アプリ導入前に申請した書籍を登録すると、今後の重複チェックに反映されます。日付・レシートは省略可能。
    </p>
    <form id="legacyForm">
      <div class="field-row">
        <div class="field"><label>年度</label>
          <select id="lf_year"></select>
        </div>
        <div class="field"><label>合計金額(税込)</label>
          <input type="number" id="lf_amount" min="0" step="1" />
        </div>
      </div>
      <div class="field">
        <label>書籍と金額</label>
        <div id="legacyBookList"></div>
        <button type="button" id="addLegacyBookBtn" class="btn btn-ghost" style="padding:6px 10px; font-size:12px; margin-top:4px;">+ 書籍を追加</button>
        <div class="book-total">合計: <b id="legacySumDisplay">¥0</b></div>
      </div>
      <div class="field"><label>メモ（任意）</label>

const firebaseConfig = {

  storageBucket: "wel-fit-management.firebasestorage.app",

const DEFAULT_BUDGETS = { welfit: 50000, expert: 132000 };

const IMAGE_JPEG_QUALITY = 0.7;

const app = initializeApp(firebaseConfig);

const state = {

const $ = id => document.getElementById(id);
const fmtYen = n => "¥" + Number(n || 0).toLocaleString("ja-JP");
const escapeHtml = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const normalizeTitle = s => String(s || "").trim().toLowerCase().replace(/\s+/g, "").replace(/[　]/g, "").normalize("NFKC");

// 後方互換: 旧 bookTitles[string] / bookTitle:string → books[{title, amount}]
function getBooks(r) {
  if (Array.isArray(r.books) && r.books.length) return r.books;
  if (Array.isArray(r.bookTitles)) return r.bookTitles.map(t => ({ title: t, amount: 0 }));
  if (r.bookTitle) return [{ title: r.bookTitle, amount: 0 }];
  return [];
}
const sumBooks = books => books.reduce((s, b) => s + Number(b.amount || 0), 0);

function buildYearSelector() {
  const sel = $("yearSelect");
  const now = new Date().getFullYear();
  const html = [];
  for (let y = now + 1; y >= now - 10; y--) {
    html.push(`<option value="${y}"${String(y) === state.year ? " selected" : ""}>${y}年度</option>`);
  }
  sel.innerHTML = html.join("");
  sel.onchange = async () => { state.year = sel.value; await loadAll(); };

  // 過去登録モーダル用の年度プルダウンも
  const lf = $("lf_year");
  const lhtml = [];
  for (let y = now + 1; y >= now - 10; y--) {

  lf.innerHTML = lhtml.join("");
}

const yearDocRef = (uid, year) => doc(db, "users", uid, "years", year);
const appsCol = (uid, year, kind) =>
  collection(db, "users", uid, "years", year, kind === "welfit" ? "welfit_apps" : "expert_apps");

async function compressImageToDataUrl(file) {
  const dataUrl = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = () => rej(new Error("読み込み失敗")); r.readAsDataURL(file); });
  const img = await new Promise((res, rej) => { const im = new Image(); im.onload = () => res(im); im.onerror = () => rej(new Error("画像失敗")); im.src = dataUrl; });
  let { width, height } = img;
  if (Math.max(width, height) > IMAGE_MAX_EDGE) {
    const s = IMAGE_MAX_EDGE / Math.max(width, height);
    width = Math.round(width * s); height = Math.round(height * s);
  }
  const cv = document.createElement("canvas");
  cv.width = width; cv.height = height;
  cv.getContext("2d").drawImage(img, 0, 0, width, height);
  let q = IMAGE_JPEG_QUALITY;
  let out = cv.toDataURL("image/jpeg", q);
  while (out.length > IMAGE_MAX_BYTES * 1.37 && q > 0.3) { q -= 0.1; out = cv.toDataURL("image/jpeg", q); }
  return out;
}

async function loadAll() {
  if (!state.user) return;
  const uid = state.user.uid;
  try {
    const yearSnap = await getDoc(yearDocRef(uid, state.year));
    const yd = yearSnap.exists() ? yearSnap.data() : {};
    state.budgets.welfit = Number.isFinite(yd.welfitBudget) ? yd.welfitBudget : DEFAULT_BUDGETS.welfit;
    state.budgets.expert = Number.isFinite(yd.expertBudget) ? yd.expertBudget : DEFAULT_BUDGETS.expert;

    const [w, e] = await Promise.all([
      getDocs(appsCol(uid, state.year, "welfit")),
      getDocs(appsCol(uid, state.year, "expert"))
    ]);
    state.welfit = w.docs.map(d => ({ id: d.id, ...d.data() }));
    state.expert = e.docs.map(d => ({ id: d.id, ...d.data() }));

    state.expertAll = [];
    const yearsSnap = await getDocs(collection(db, "users", uid, "years"));
    await Promise.all(yearsSnap.docs.map(async yd => {
      const sub = await getDocs(appsCol(uid, yd.id, "expert"));
      sub.docs.forEach(d => state.expertAll.push({ id: d.id, year: yd.id, ...d.data() }));
    }));
  } catch (err) {
    console.error("読み込み失敗:", err);
    alert("読み込み失敗: " + err.message);
  }
  $("welfitBudgetInput").value = state.budgets.welfit;
  $("expertBudgetInput").value = state.budgets.expert;
  renderWelfit();
  renderExpert();
  renderBookList();
}

// ===== Wel-fit リスト =====
function renderWelfit() {
  const list = $("welfitList");
  list.innerHTML = "";
  let used = 0;
  const rows = [...state.welfit].sort((a,b) => (b.date||"").localeCompare(a.date||""));
  if (!rows.length) {
    list.innerHTML = `<div class="empty">まだ申請がありません</div>`;
  }
  for (const r of rows) {
    used += Number(r.amount || 0);
    const applied = r.applied === true || r.applied === "申請済";
    const receipt = r.receiptData
      ? `<img class="receipt-thumb" src="${escapeHtml(r.receiptData)}" data-act="view" data-kind="welfit" data-id="${r.id}" />`
      : `<div class="receipt-empty" title="レシートなし">📄</div>`;
    const el = document.createElement("div");
    el.className = "item";
    el.innerHTML = `
      <div class="main">
        <div class="row1">
          <span class="amount">${fmtYen(r.amount)}</span>
          <span class="date">${escapeHtml(r.date || "")}</span>
        </div>
        <div class="row2">
          <button class="applied-toggle ${applied ? "on" : ""}" data-act="toggle" data-kind="welfit" data-id="${r.id}">
            <span class="dot"></span>${applied ? "申請済" : "未申請"}
          </button>
          ${r.note ? `<span class="note">${escapeHtml(r.note)}</span>` : ""}
        </div>
      </div>
      <div class="actions">
        ${receipt}
        <button class="icon-btn" data-act="edit" data-kind="welfit" data-id="${r.id}" title="編集">✏️</button>
        <button class="icon-btn danger" data-act="del" data-kind="welfit" data-id="${r.id}" title="削除">🗑</button>
      </div>`;
    list.appendChild(el);
  }
  const remain = state.budgets.welfit - used;
  $("welfitRemain").textContent = fmtYen(remain);
  $("welfitRemainCard").classList.toggle("negative", remain < 0);
}

// ===== エキスパート基金 リスト =====
function renderExpert() {
  const list = $("expertList");
  list.innerHTML = "";
  let used = 0;
  const rows = [...state.expert].sort((a,b) => (b.date||"").localeCompare(a.date||""));
  if (!rows.length) {
    list.innerHTML = `<div class="empty">まだ申請がありません</div>`;
  }
  for (const r of rows) {

    const titlesHtml = books.map(b => {
      const dup = state.expertAll.some(e =>
        getBooks(e).some(eb => normalizeTitle(eb.title) === normalizeTitle(b.title)) &&
        !(e.year === state.year && e.id === r.id)
      );
      return `<span class="title-pill ${dup ? "dup" : ""}">${escapeHtml(b.title)}${b.amount ? ` <span class="amt">${fmtYen(b.amount)}</span>` : ""}${dup ? " ⚠" : ""}</span>`;
    }).join("");
    const el = document.createElement("div");
    el.className = "item";
    el.innerHTML = `
      <div class="main">
        <div class="row1">
          <span class="amount">${fmtYen(total)}</span>
          <span class="date">${escapeHtml(r.date || "")}</span>
        </div>
        ${titlesHtml ? `<div class="title-list" style="margin-bottom:4px;">${titlesHtml}</div>` : ""}
        <div class="row2">
          <button class="applied-toggle ${applied ? "on" : ""}" data-act="toggle" data-kind="expert" data-id="${r.id}">
            <span class="dot"></span>${applied ? "申請済" : "未申請"}
          </button>
          ${r.note ? `<span class="note">${escapeHtml(r.note)}</span>` : ""}
        </div>
      </div>
      <div class="actions">
        ${receipt}
        <button class="icon-btn" data-act="edit" data-kind="expert" data-id="${r.id}" title="編集">✏️</button>
        <button class="icon-btn danger" data-act="del" data-kind="expert" data-id="${r.id}" title="削除">🗑</button>
      </div>`;
    list.appendChild(el);
  }
  const remain = state.budgets.expert - used;
  $("expertRemain").textContent = fmtYen(remain);
  $("expertRemainCard").classList.toggle("negative", remain < 0);
}

// ===== 書籍重複一覧 =====
function renderBookList(filter = "") {
  const body = $("bookListBody");
  body.innerHTML = "";
  const norm = normalizeTitle(filter);
  const flat = [];
  state.expertAll.forEach(e => {
    getBooks(e).forEach(b => flat.push({
      title: b.title, amount: b.amount, year: e.year, appId: e.id,
      receiptData: e.receiptData, legacy: !!e.legacy
    }));
  });
  const counts = new Map();
  flat.forEach(f => { const k = normalizeTitle(f.title); counts.set(k, (counts.get(k) || 0) + 1); });
  const list = flat
    .filter(f => f.title && (!filter || normalizeTitle(f.title).includes(norm)))
    .sort((a,b) => (a.title||"").localeCompare(b.title||"", "ja"));
  for (const f of list) {
    const isDup = counts.get(normalizeTitle(f.title)) > 1;
    const row = document.createElement("div");
    row.className = "book-row" + (isDup ? " dup" : "");
    row.innerHTML = `
      <div>${escapeHtml(f.title)}${f.legacy ? ' <span class="dup-badge" style="background:rgba(124,156,255,.15); color:#a8c0ff; border-color:rgba(124,156,255,.25);">過去</span>' : ""}${isDup ? ' <span class="dup-badge">重複</span>' : ""}</div>
      <div class="year">${escapeHtml(f.year)}</div>
      <div class="amt">${f.amount ? fmtYen(f.amount) : "—"}</div>
      <div>${f.receiptData ? `<img class="receipt-thumb" src="${escapeHtml(f.receiptData)}" data-act="view" data-kind="expert-all" data-id="${f.appId}" data-year="${escapeHtml(f.year)}" />` : ""}</div>`;
    body.appendChild(row);
  }
  if (!list.length) {
    body.innerHTML = `<div class="empty">${filter ? "該当する書籍がありません" : "まだ書籍が登録されていません"}</div>`;
  }
}

// ===== モーダル =====
window.closeModal = () => $("modal").classList.remove("show");
window.closeImageModal = () => $("imageModal").classList.remove("show");
window.closeLegacyModal = () => $("legacyModal").classList.remove("show");

function appendBookRow(container, book = { title: "", amount: "" }, onUpdate) {
  const row = document.createElement("div");
  row.className = "book-input-row";
  row.innerHTML = `
    <input type="text" placeholder="書籍名" />
    <input type="number" placeholder="金額" min="0" step="1" />
    <button type="button" class="remove" title="削除">×</button>`;
  const [titleInput, amountInput] = row.querySelectorAll("input");
  titleInput.value = book.title || "";
  amountInput.value = book.amount || "";
  titleInput.addEventListener("input", onUpdate);
  amountInput.addEventListener("input", onUpdate);
  row.querySelector(".remove").onclick = () => {
    if (container.children.length > 1) row.remove();
    else { titleInput.value = ""; amountInput.value = ""; }
    onUpdate();
  };
  container.appendChild(row);
  return row;
}

function readBookRows(container) {
  return [...container.children].map(row => {
    const [t, a] = row.querySelectorAll("input");
    return { title: t.value.trim(), amount: Number(a.value || 0) };
  }).filter(b => b.title);
}

function updateBookSum(container, sumEl) {
  const sum = readBookRows(container).reduce((s, b) => s + (b.amount || 0), 0);
  sumEl.textContent = fmtYen(sum);
}

function renderModalBookRows(books) {
  const container = $("bookTitlesList");
  container.innerHTML = "";
  const list = books.length ? books : [{ title: "", amount: "" }];
  const onUpdate = () => { updateBookSum(container, $("bookSumDisplay")); checkModalDup(); };
  list.forEach(b => appendBookRow(container, b, onUpdate));
  updateBookSum(container, $("bookSumDisplay"));
}

function openModal(kind, row) {
  state.pendingReceiptFile = null;
  $("f_kind").value = kind;
  $("f_id").value = row ? row.id : "";
  $("modalTitle").textContent = (row ? "編集" : "追加") + " — " + (kind === "welfit" ? "Wel-fit" : "エキスパート基金");
  $("f_date").value = row?.date || new Date().toISOString().slice(0,10);
  $("f_amount").value = row?.amount ?? "";
  $("f_note").value = row?.note || "";
  $("f_receipt").value = "";
  $("f_existingReceiptData").value = row?.receiptData || "";
  document.querySelectorAll(".expert-only").forEach(el => el.style.display = kind === "expert" ? "" : "none");
  document.querySelectorAll(".welfit-only").forEach(el => el.style.display = kind === "welfit" ? "" : "none");
  $("f_amount").required = kind === "welfit";
  renderModalBookRows(row ? getBooks(row) : []);
  if (row?.receiptData) {
    $("f_receiptImg").src = row.receiptData;
    $("f_receiptPreview").classList.remove("hidden");
  } else {
    $("f_receiptPreview").classList.add("hidden");
  }
  checkModalDup();
  $("modal").classList.add("show");
}

function checkModalDup() {
  const kind = $("f_kind").value;
  const warn = $("f_dupWarn");
  if (kind !== "expert") { warn.classList.add("hidden"); return; }
  const books = readBookRows($("bookTitlesList"));
  const editingId = $("f_id").value;
  if (!books.length) { warn.classList.add("hidden"); return; }
  const dups = [];
  for (const b of books) {
    const norm = normalizeTitle(b.title);
    const hits = state.expertAll.filter(e =>
      getBooks(e).some(eb => normalizeTitle(eb.title) === norm) && e.id !== editingId
    );
    if (hits.length) dups.push(`「${b.title}」: ${hits.length}件 (${hits.map(h => h.year + "年度").join(", ")})`);
  }
  if (!dups.length) { warn.classList.add("hidden"); return; }
  warn.innerHTML = `⚠ 重複の可能性<br>${dups.join("<br>")}`;
  warn.classList.remove("hidden");
}

async function saveModal(e) {
  e.preventDefault();
  if (!state.user) return;
  const saveBtn = $("saveBtn");
  saveBtn.disabled = true; saveBtn.textContent = "保存中…";
  try {
    const uid = state.user.uid;
    const kind = $("f_kind").value;
    const id = $("f_id").value;
    const data = {
      date: $("f_date").value,
      note: $("f_note").value || "",
      updatedAt: serverTimestamp()
    };
    if (kind === "expert") {
      const books = readBookRows($("bookTitlesList"));
      data.books = books;
      data.bookTitles = null;
      data.bookTitle = null;
      data.amount = sumBooks(books);
    } else {
      data.amount = Number($("f_amount").value || 0);
    }
    if (state.pendingReceiptFile) {
      saveBtn.textContent = "画像圧縮中…";
      data.receiptData = await compressImageToDataUrl(state.pendingReceiptFile);
    } else {
      data.receiptData = $("f_existingReceiptData").value || "";
    }
    saveBtn.textContent = "保存中…";
    await setDoc(yearDocRef(uid, state.year), { year: state.year }, { merge: true });
    if (id) {
      await setDoc(doc(appsCol(uid, state.year, kind), id), data, { merge: true });
    } else {
      data.applied = false;
      data.createdAt = serverTimestamp();
      await addDoc(appsCol(uid, state.year, kind), data);
    }
    closeModal();
    await loadAll();
  } catch (err) {
    console.error(err);
    alert("保存失敗: " + err.message);
  } finally {
    saveBtn.disabled = false; saveBtn.textContent = "保存";
  }
}

// ===== 過去書籍登録 =====
function openLegacyModal() {
  if (!state.user) { alert("ログインが必要です"); return; }
  const container = $("legacyBookList");
  container.innerHTML = "";
  const onUpdate = () => updateBookSum(container, $("legacySumDisplay"));
  appendBookRow(container, { title: "", amount: "" }, onUpdate);
  updateBookSum(container, $("legacySumDisplay"));
  $("lf_amount").value = "";
  $("lf_note").value = "";
  $("legacyModal").classList.add("show");
}

async function saveLegacy(e) {
  e.preventDefault();
  if (!state.user) return;
  const btn = $("legacySaveBtn");
  btn.disabled = true; btn.textContent = "登録中…";
  try {
    const uid = state.user.uid;
    const year = $("lf_year").value;
    const books = readBookRows($("legacyBookList"));
    if (!books.length) { alert("書籍を1冊以上入力してください"); return; }
    const sum = sumBooks(books);
    const explicit = Number($("lf_amount").value || 0);
    const data = {
      date: "",
      books,
      amount: explicit > 0 ? explicit : sum,
      applied: true,
      legacy: true,
      note: $("lf_note").value || "過去登録",
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    };
    await setDoc(yearDocRef(uid, year), { year }, { merge: true });
    await addDoc(appsCol(uid, year, "expert"), data);
    closeLegacyModal();
    await loadAll();
  } catch (err) {
    console.error(err);
    alert("登録失敗: " + err.message);
  } finally {
    btn.disabled = false; btn.textContent = "登録";
  }
}

async function toggleApplied(kind, id) {
  const uid = state.user.uid;
  const list = kind === "welfit" ? state.welfit : state.expert;
  const row = list.find(r => r.id === id);
  if (!row) return;
  const current = row.applied === true || row.applied === "申請済";
  row.applied = !current;
  if (kind === "welfit") renderWelfit(); else renderExpert();
  try {
    await updateDoc(doc(appsCol(uid, state.year, kind), id), { applied: !current, updatedAt: serverTimestamp() });
  } catch (e) {
    alert("更新失敗: " + e.message);
    await loadAll();
  }
}

async function deleteRow(kind, id) {
  if (!confirm("削除しますか？")) return;
  const uid = state.user.uid;
  await deleteDoc(doc(appsCol(uid, state.year, kind), id));
  await loadAll();
}

function openImageView(url) {
  $("imageModalImg").src = url;
  $("imageDownloadLink").href = url;
  $("imageModal").classList.add("show");
}

async function saveBudget(kind) {
  if (!state.user) return;
  const uid = state.user.uid;
  const input = kind === "welfit" ? $("welfitBudgetInput") : $("expertBudgetInput");
  const val = Number(input.value);
  if (!Number.isFinite(val) || val < 0) { input.value = state.budgets[kind]; return; }
  state.budgets[kind] = val;
  try {
    await setDoc(yearDocRef(uid, state.year), {
      year: state.year,
      [kind === "welfit" ? "welfitBudget" : "expertBudget"]: val
    }, { merge: true });
    if (kind === "welfit") renderWelfit(); else renderExpert();
  } catch (e) {
    alert("予算保存失敗: " + e.message);
  }
}

function bindEvents() {
  const login = () => signInWithPopup(auth, provider).catch(err => alert("ログイン失敗: " + err.message));
  $("loginBtn").onclick = login;
  $("loginBtn2").onclick = login;
  $("logoutBtn").onclick = () => signOut(auth);
  $("addWelfit").onclick = () => openModal("welfit", null);
  $("addExpert").onclick = () => openModal("expert", null);
  $("modalForm").onsubmit = saveModal;
  $("legacyForm").onsubmit = saveLegacy;
  $("addLegacyBtn").onclick = openLegacyModal;
  $("bookSearch").addEventListener("input", e => renderBookList(e.target.value));

  $("addBookTitleBtn").onclick = () => {
    const container = $("bookTitlesList");
    const onUpdate = () => { updateBookSum(container, $("bookSumDisplay")); checkModalDup(); };
    const row = appendBookRow(container, { title: "", amount: "" }, onUpdate);
    row.querySelector("input").focus();
    onUpdate();
  };
  $("addLegacyBookBtn").onclick = () => {
    const container = $("legacyBookList");
    const onUpdate = () => updateBookSum(container, $("legacySumDisplay"));
    const row = appendBookRow(container, { title: "", amount: "" }, onUpdate);
    row.querySelector("input").focus();
    onUpdate();
  };

  $("welfitBudgetInput").addEventListener("change", () => saveBudget("welfit"));
  $("welfitBudgetInput").addEventListener("blur", () => saveBudget("welfit"));
  $("expertBudgetInput").addEventListener("change", () => saveBudget("expert"));
  $("expertBudgetInput").addEventListener("blur", () => saveBudget("expert"));

  $("f_receipt").addEventListener("change", e => {
    const file = e.target.files[0]; if (!file) return;
    if (file.size > 20 * 1024 * 1024) { alert("画像が20MBを超えています"); e.target.value = ""; return; }
    state.pendingReceiptFile = file;
    const r = new FileReader();
    r.onload = ev => { $("f_receiptImg").src = ev.target.result; $("f_receiptPreview").classList.remove("hidden"); };
    r.readAsDataURL(file);
  });
  $("f_removeReceipt").onclick = () => {
    state.pendingReceiptFile = null;
    $("f_receipt").value = "";
    $("f_existingReceiptData").value = "";
    $("f_receiptPreview").classList.add("hidden");
  };

  document.body.addEventListener("click", e => {
    const btn = e.target.closest("[data-act]"); if (!btn) return;
    const { act, kind, id, year } = btn.dataset;
    if (act === "view") {
      let row;
      if (kind === "expert-all") row = state.expertAll.find(r => r.id === id && r.year === year);
      else { const list = kind === "welfit" ? state.welfit : state.expert; row = list.find(r => r.id === id); }
      if (row?.receiptData) openImageView(row.receiptData);
      return;
    }
    if (act === "toggle") { toggleApplied(kind, id); return; }
    const list = kind === "welfit" ? state.welfit : state.expert;
    const row = list.find(r => r.id === id);
    if (act === "edit") openModal(kind, row);
    if (act === "del") deleteRow(kind, id);
  });
  window.addEventListener("click", e => {
    if (e.target.id === "modal") closeModal();
    if (e.target.id === "imageModal") closeImageModal();
    if (e.target.id === "legacyModal") closeLegacyModal();
  });
}

onAuthStateChanged(auth, async user => {
  state.user = user;
  if (user) {
    const name = user.displayName || user.email || "?";
    $("userName").textContent = name;
    $("userAvatar").textContent = (name[0] || "?").toUpperCase();
    $("userChip").classList.remove("hidden");
    $("loginBtn").classList.add("hidden");
    $("logoutBtn").classList.remove("hidden");
    $("signinNotice").classList.add("hidden");
    $("appBody").classList.remove("hidden");
    await loadAll();
  } else {
    $("userChip").classList.add("hidden");
    $("loginBtn").classList.remove("hidden");
    $("logoutBtn").classList.add("hidden");
    $("signinNotice").classList.remove("hidden");
    $("appBody").classList.add("hidden");
  }
});

buildYearSelector();
setupTabs();
bindEvents();
$("welfitBudgetInput").value = state.budgets.welfit;
$("expertBudgetInput").value = state.budgets.expert;
</script>
</body>
</html>
